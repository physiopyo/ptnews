name: autoupdate

on:
  schedule:
    - cron: '9,29,49 * * * *'   # 매시 :09,:29,:49 (20분 간격). GitHub 예정 런 누락·지연을 흡수해 1시간 내 신선도 보장. 런 약 11분이라 겹침 없음(공개 레포 무료)
  workflow_dispatch:        # 수동 실행 버튼

permissions:
  contents: write           # 커밋/푸시용 (기본 GITHUB_TOKEN)

concurrency:
  group: autoupdate
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul          # 보드 타임스탬프를 한국시간(KST)으로 (datetime.now)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install python deps
        run: pip install -r pipeline/requirements.txt

      - name: Run autoupdate
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          KAKAO_KEY: ${{ secrets.KAKAO_KEY }}
        run: python pipeline/autoupdate_ci.py

      - name: Commit & push
        run: |
          rm -f pipeline/_news/*key*.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "auto(ci): 보드 자동 갱신 $(date +'%Y-%m-%d %H:%M KST')"
            git push
          fi
