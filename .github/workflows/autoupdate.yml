name: autoupdate

on:
  schedule:
    - cron: '9 * * * *'   # 매시 :09 (1시간 간격). 네이버/구글 무료 한도 안에서 안전. GitHub 스케줄 누락은 외부핑(cron-job.org)으로 보강 권장
  workflow_dispatch:        # 수동 실행 버튼
    inputs:
      skip_fetch:
        description: '수집 건너뛰고 빌드만 (코드/문구 변경 즉시 반영용)'
        type: boolean
        default: false

permissions:
  contents: write           # 커밋/푸시용 (기본 GITHUB_TOKEN)

concurrency:
  group: autoupdate
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul          # 보드 타임스탬프를 한국시간(KST)으로 (datetime.now)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'                                  # pip 캐시로 kiwipiepy 등 재설치 시간 단축
          cache-dependency-path: pipeline/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install python deps
        run: |
          if [ -n "${{ (github.event_name == 'workflow_dispatch' && inputs.skip_fetch) && '1' || '' }}" ]; then
            mkdir -p ~/.cache/pip                        # 캐시 저장 단계 에러 방지(설치 생략 시 폴더 보장)
            echo "skip_fetch → 의존성 설치 생략"
          else
            pip install -r pipeline/requirements.txt
          fi

      - name: Run autoupdate
        env:
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_SECRET: ${{ secrets.NAVER_SECRET }}
          KAKAO_KEY: ${{ secrets.KAKAO_KEY }}
          SKIP_FETCH: ${{ (github.event_name == 'workflow_dispatch' && inputs.skip_fetch) && '1' || '' }}
        run: python pipeline/autoupdate_ci.py

      - name: Commit & push
        run: |
          rm -f pipeline/_news/*key*.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "auto(ci): 보드 자동 갱신 $(date +'%Y-%m-%d %H:%M KST')"
            git pull --rebase origin master || true      # 푸시 경합(동시 실행) 방지
            git push
          fi

      - name: Check Cloudflare token
        id: cfck
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "ready=1" >> "$GITHUB_OUTPUT"
          else
            echo "ready=0" >> "$GITHUB_OUTPUT"
            echo "Cloudflare 토큰(CLOUDFLARE_API_TOKEN) 없음 — CF Pages 배포 생략"
          fi

      - name: Deploy to Cloudflare Pages
        if: steps.cfck.outputs.ready == '1'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          rm -rf cfdist && mkdir cfdist
          cp index.html cfdist/
          if [ -f d3.layout.cloud.min.js ]; then cp d3.layout.cloud.min.js cfdist/; fi
          cp -r img cfdist/
          cp -r guide cfdist/
          npx --yes wrangler@4 pages deploy cfdist --project-name=ptnews --branch=main --commit-dirty=true
