s://www.newspim.com/news/view/20260624001060","img":"img/pr_a62e86dff40.jpg","dt":"2026-06-24T16:47:00+09:00","desc":"[세종=뉴스핌] 신도경 기자 = 도수치료 가격을 1일당 4만3850원으로 적용하고 횟수를 연 15회로 제한하는 내용을 담은"},{"date":"2026-06-24","disp":"26.06.24","chip":"이비엔(EBN)뉴스센터","title":"도수치료 관리급여 추진에 반발 확산…물리치료사·환자 \"접근성 저해 우려\" - 이비엔(EBN)뉴스센터","url":"https://www.ebn.co.kr/news/articleView.html?idxno=1713796","img":"img/pr_adc8ab6dccb.jpg","dt":"2026-06-24T16:42:01+09:00","desc":"보건복지부가 도수치료를 관리급여(선별급여) 체계로 편입하는 방안을 추진하는 가운데, 물리치료사와 환자들이 제도 재검토를 요구하며 공동 대응에 나섰다. 이들은 횟수"},{"date":"2026-06-24","disp":"26.06.24","chip":"투데이신문","title":"도수치료 묶였는데 체외충격파는?…실손보험 새 변수 ‘풍선효과’","url":"https://www.ntoday.co.kr/news/articleView.html?idxno=127807","img":"img/pr_af67308efd0.jpg","dt":"2026-06-24T16:00:53+09:00","desc":"【투데이신문 김효인 기자】 다음 달부터 도수치료가 건강보험 관리급여로 전환되면서 가격과 이용 횟수에 사실상 제한이 걸린다. 실손보험 적자의 주요 원인으로 꼽혀 온 도수치료 이용이 줄어들 것으로 예상되면서 보험업계는 손해율 개선을 기대하고 있다. 다만 체외충격파 치료 등 다른 비급여 항목으로 수요가 이동하는 이른바 ‘풍선효과’ 가능성도 새로운 변수로 떠오르고 있다.24일 보헙업계에 따르면, 보건복지부는 7월부터 도수치료를 관리급여 항목으로 편입한다. 이에 따라 도수치료 수가는 1회 4만3850원으로 정해지고 환자 본인부담률은 95%가"},{"date":"2026-06-24","disp":"26.06.24","chip":"내일신문","title":"물리치료사협회, 도수치료 관리급여 강행 저지 위한 총 궐기대회 개최","url":"https://www.naeil.com/news/read/593028?ref=naver","img":"img/pr_ad3d7d7ee4f.jpg","dt":"2026-06-24T15:57:56+09:00","desc":"28일 2시 서울 경복궁 동십자각 앞 … “권고사직·실업 … 생존권 위협 당해” 대한물리치료사협회(회장 양대림)는 오는 28일 서울 경복궁 동십자각 앞에서 ‘도수치료 관리급여 강행 저지를 위한 총궐기대회’를 개최한다. 24일 ‘도수치료 생존권 수호 전국 회원 연대’(회원 공동대표 김동현, 이하 회원 연대)는 28일 대회에서 정부의 졸속 정책을 규탄하고 물리치료사의 직업적 주권을 선언할 예정이다. 물치협 집행부는 이번 사태를 물리치료계 전체의 실직과 생존권이 걸린 절대적 비상사태로 규정했다. 전국의 회원들은 전체 직역을 하나로 묶는 강력한 투쟁 결사체인 ‘회원 연대’ 체제를 자발적으로 전격 구축해 끝까지 투쟁 할 것을 결의했다. 회원 연대는 도수치료가 단순한 보조 행위가 아니라 생체역학과 신경생리학적 전문성에"},{"date":"2026-06-24","disp":"26.06.24","chip":"대구일보","title":"도수치료 제한, 물리치료학과 학생들에 ‘불똥’…“취업문 닫힐라” 우려 확산","url":"https://www.idaegu.com/news/articleView.html?idxno=663844","img":"img/pr_a37ed4ea260.jpg","dt":"2026-06-24T14:58:48+09:00","desc":"정부가 최근 실손보험 재정 누수와 과잉 진료를 막기 위해 도
