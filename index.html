자체는 변경되지 않았다(최신 재다운로드본과 sha256·바이트 동일). 다만 행정예고안과 6.29 확정고시 본문을 대조하면 다음 두 가지가 달라졌으므로, 6.19 안을 본 경우 확정고시 기준으로 갱신해야 한다.</p>\n<ol>\n<li>물리치료사 시행 시 의사 지도 요건 삭제: 행정예고안에는 \"도수치료를 실시하는 사람 중 나)(상근 물리치료사)의 경우 가)의 의사로부터 지도를 받아야 함\"이 있었으나, 확정고시에서는 이 지도 요건 문구가 빠졌다.</li>\n<li>진료기록 작성·보존 주체 변경: 행정예고안은 \"상기 사.1)의 의사는 ... 진료기록을 작성·보존하여야 함\"으로 의사를 주체로 두었으나, 확정고시는 \"요양기관은 ... 기록을 작성·보존하여야 함\"으로 요양기관을 주체로 명시했다.</li>\n</ol>\n<ol>\n<li>질의응답 개정: 6.29 심평원 공지(brdBltNo=12133)에 「도수치료 관리급여 기준 질의응답_수정」이 게시되어 6.19 행정예고 별첨 질의응답을 대체한다. 주요 추가: 소아 사경·수술 후(관절운동범위 제한) 환자 선행치료 면제(Q21), 치료실·장비 기준(Q28), 신포괄 시범사업 기관도 도수치료 관리시스템 제출 의무(Q39), 삭제요청 연락처 확정(급여전략실 급여전략부 033-739-0313).</li>\n</ol>\n<p>아래 본문은 모두 확정고시(2026.6.29 공포, 2026.7.1 시행) 기준이다.</p>\n"},{"h":"1. 한눈 요약","html":"<ul>\n<li>도수치료가 비급여에서 관리급여(선별급여의 한 형태)로 전환된다.</li>\n<li>수가: 1일당 43,850원 수준. 전국 모든 요양기관 동일 단가(종별가산 없음).</li>\n<li>본인부담률: 95%. 명세서 진료내역 F항(100분의 95)으로 청구한다.</li>\n<li>횟수: 1일 1회, 주 2회 이내, 연간 15회 이내가 원칙. 의학적 예외 시 연 24회.</li>\n<li>선행 요건: 기본물리치료 또는 단순재활치료를 2주 이상·4회 이상 먼저 시행해야 한다.</li>\n<li>전산: 도수치료 관리시스템에 진료정보를 전송해야만 관리급여가 인정된다.</li>\n</ul>\n<h3>급여 적용 흐름 (요약)</h3>\n<pre>[1] 환자 내원: 기능이상·통증 지속 근골격계질환\n      ↓\n[2] 선행치료: 기본물리/단순재활치료 2주 이상·4회 이상 시행, 호전 없음\n      (타 기관·7.1 이전분도 인정. 소아 사경·수술 후 관절운동범위 제한은 면제 → 즉시)\n      ↓\n[3] 처방: 정형·신경·재활·마취통증 전문의 또는 교육이수 의사\n      ↓\n[4] 시행: 1대1 수기 30분 이상 (의사 또는 교육이수 상근 물리치료사)\n      ↓\n[5] 관리시스템 등록: ef.hira.or.kr (횟수보기로 전국 누적 확인 후 한도 내 제출)\n      ↓\n[6] 청구: 제7편 관리급여, 명세서 F항(본인부담 95%, 1회 약 41,660원)</pre>\n"},{"h":"2. 무엇이 바뀌나","html":"<ul>\n<li>기존 비급여 항목 「서-122 도수치료[1일당]」가 삭제되고, 「건강보험 행위 급여·비급여 목록표」 제7편 관리급여목록에 「관리-1 도수치료[1일당]」로 신설된다.</li>\n<li>관리급여에는 요양기관 종별가산율과 소아·야간·공휴 등 각종 가산을 적용하지 않는다.</li>\n</ul>\n"},{"h":"3. 수가·본인부담","html":"<ul>\n<li>상대가치점수는 종별로 차등하되, 산출 금액(요양급여비용)은 전 종별 1일당 43,850원으로 동일하게 설계되었다(종별가산 미적용).</li>\n</ul>\n<div class=\"tw\"><table><thead><tr><th>종별</th><th>코드</th><th>상대가치점수</th><th>요양급여비용</th><th>본인부담(95%)</th></tr></thead><tbody><tr><td>의원</td><td>KR006</td><td>458.68</td><td>43,850원</td><td>약 41,660원</td></tr><tr><td>병원·종합·상급종합</td><td>KR001</td><td>523.27</td><td>43,850원</td><td>약 41,660원</td></tr><tr><td>요양·정신병원 내 의과</td><td>KR002</td><td>520.78</td><td>43,850원</td><td>약 41,660원</td></tr><tr><td>치과병원 내 의과</td><td>KR003</td><td>433.73</td><td>43,850원</td><td>약 41,660원</td></tr><tr><td>한방병원 내 의과</td><td>KR004</td><td>420.42</td><td>43,850원</td><td>약 41,660원</td></tr><tr><td>보건의료원 내 의과</td><td>KR005</td><td>444.73</td><td>43,850원</td><td>약 41,660원</td></tr></tbody></table></div>\n<p>(점수 × 2026 환산지수 ≈ 43,850원으로 전 종별 동일. 보건복지부 2026.6.4 보도자료.)</p>\n<ul>\n<li>본인부담률 95%는 「선별급여 지정 및 실시 등에 관한 기준」 별표2의2에 따른다. 의료급여 1종·2종, 차상위계층도 별도 감면 없이 95%가 적용된다.</li>\n</ul>\n"},{"h":"4. 급여 대상","html":"<ul>\n<li>기능이상 및 통증이 지속되는 근골격계질환(예: 요통, 척추관 협착증, 관절 구축 등)에 대해 30분 이상 실시한 경우 인정한다.</li>\n<li>해당 상병이 주상병이거나 부상병인 경우 모두 적용된다.</li>\n<li>근골격계질환 외에는 요양급여비용을 산정할 수 없다.</li>\n<li>고시·질의응답에 특정 질병코드(상병코드) 목록은 명시되어 있지 않다(포괄 규정). 개별 질환의 인정 여부는 위 일반기준과 처방의의 의학적 판단에 따른다. 사경 관련 처리는 5항·8항 참고(일반 사경 운동요법은 사116 복합운동치료, 소아 사경에 도수치료를 시행하는 경우는 선행치료 면제).</li>\n</ul>\n"},{"h":"5. 선행치료 요건 (필수)","html":"<ul>\n<li>「건강보험 행위 급여·비급여 목록표」 제7장 이학요법료 제1절 기본물리치료료 또는 제2절 단순재활치료료를 우선 시행하는 것이 원칙이다.</li>\n<li>우선 시행 기간 최소 2주(14일) 이상, 시행 횟수 4회 이상이어야 한다.</li>\n<li>그럼에도 호전이 없을 때 도수치료를 시행한 경우에 인정한다.</li>\n<li>선행치료는 해당 요양기관에서만 충족할 필요는 없다. 타 요양기관에서 시행한 경우에도 인정되며, 환자가 타 기관 선행치료 후 내원한 당일에도 도수치료 시행이 가능하다.</li>\n<li>관리급여 적용일(7.1) 이전에 시행한 기본물리치료·단순재활치료도 우선 시행으로 인정된다.</li>\n<li>수술이 필요한 근골격계질환 환자는 일반적으로 수술 전 우선 시행이 이루어졌을 것으로 본다.</li>\n<li>선행치료 면제: 소아의 사경, 또는 수술 후(관절운동범위 제한으로 시행하는 경우 등)에는 의사의 의학적 판단으로 선행치료(2주·4회) 없이 즉시 도수치료 시행이 가능하다. (심평원 질의응답_수정, 2026.6.29, Q21)</li>\n</ul>\n"},{"h":"6. 처방·시행 인력·치료실·장비","html":"<ul>\n<li>처방: 정형외과·신경외과·재활의학과·마취통증의학과 전문의, 또는 보건복지부장관이 정하는 바에 따라 관련 교육을 이수한 의사.</li>\n<li>시행: 위 의사 본인, 또는 해당 요양기관에 상근하는 물리치료사로서 관련 교육을 이수한 자.</li>\n<li>1대1, 수기로 30분 이상 실시한 경우 산정한다. 1인이 다수 환자에게 동시 적용한 경우는 인정되지 않는다.</li>\n<li>의사·물리치료사 1인당 1일 실시 인원의 상한은 두지 않는다.</li>\n<li>교육 경과: 의사·물리치료사 교육과정은 대한의사협회 등 협의로 신설·운영 예정이며, 이수증 발급단체 지정과 준비기간이 필요하여 보건복지부 안내 시까지 유예기간이 있다. 안내 이후에는 4개과 전문의 외의 의사·물리치료사는 보건의료자원 통합신고포털(hurb.or.kr)에서 교육 이수 여부를 신고해야 한다.</li>\n<li>치료실·장비: 해당 항목의 물리치료를 실시할 수 있는 일정한 면적의 치료실과 실제 사용 가능한 장비를 보유해야 한다(고시 바목). 세부 기준은 의료법 시행규칙 별표4 의료기관의 시설규격(제34조 관련)과 「건강보험 행위 급여·비급여 목록표」 제1편 제2부 제7장 이학요법료 주·항의 물리치료 실시 요건을 따른다(질의응답 Q28).</li>\n</ul>\n"},{"h":"7. 횟수 규칙","html":"<ul>\n<li>1일 1회만 산정한다. 여러 부위를 실시해도, 입원·외래 불문, 요양기관 불문 환자당 1일 1회다.</li>\n<li>주 2회 이내. 주 단위는 월요일부터 일요일까지를 의미한다.</li>\n<li>연간 15회 이내. 연간은 회계연도(매년 1.1~12.31)를 의미한다.</li>\n<li class=\"sub\">2026년은 적용일(7.1)부터 12.31까지 15회 산정 가능하다.</li>\n<li>의학적 예외: 수술 또는 골절 등으로 인한 관절의 구축·강직의 뚜렷한 소견이 있는 경우, 의사의 의학적 판단으로 연간 총 24회(15회 포함)까지 인정한다. 수술·골절 병력이 없더라도 퇴행성관절염·오십견 등으로 구축·강직의 뚜렷한 소견이 있으면 추가 9회(총 24회)까지 가능하다.</li>\n<li>예외 적용 절차: 15회를 초과하는 시점에 예외사유를 판단하여 시스템에서 예외사유 Y를 선택해 제출하면 별도 절차 없이 인정된다. 단, 치료효과 평가 등 관련 내용을 진료기록부에 반드시 작성·보존해야 한다.</li>\n<li>자격(건강보험·의료급여·보훈) 변경 시에도 환자당 연 15회(예외 24회) 한도는 합산·공유되며, 잔여 횟수만 적용된다.</li>\n</ul>\n"},{"h":"8. 동시 산정 규칙","html":"<ul>\n<li>마사지치료(사105)는 도수치료 소정점수에 포함되어 별도 산정 불가.</li>\n<li>운동치료(사106, 사116) 또는 재활기능치료(사130)와 같은 날 실시한 경우 주된 항목의 소정점수만 산정.</li>\n<li>국소주사 등(관절강내·신경간내주사·신경차단술 등)은 의사의 의학적 판단으로 인정기준에 부합하면 동시 산정 가능.</li>\n<li>비급여 물리치료(체외충격파·신장분사 등) 동시 시행은 별도 제한은 없으나, 전문학회 가이드라인 준수를 권고하며 동시 시술에 대한 별도 모니터링이 진행될 예정이다.</li>\n<li>참고(사경 등): 사경(Torticollis)에 실시한 운동요법은 도수치료가 아니라 사116 복합운동치료[1일당]로 산정한다(고시 제2007-46호, '07.6.1 시행. 사116 적용대상에 '자발성 운동장애(강직성 사경 등)' 포함). 사116은 일반 급여 행위로 본인부담률·산정방식이 도수치료 관리급여(95%)와 다르며, 1일 1회·횟수 불문으로 1일당 소정점수를 산정한다. 6.29 도수치료 확정고시 4건은 이 사경·사116 규정을 변경하지 않았다(종전과 동일).</li>\n<li class=\"sub\">사116-가 복합운동치료[1일당] 소정점수 105.21점(코드 MM102). 2026 환산지수(고시 제2025-186호, 2026.1.1 적용) 적용 시 요양급여비용: 의원 약 10,060원(95.6원), 병원·종합·상급종합 약 8,820원(83.8원), 요양·정신병원 약 8,860원(84.2원), 치과 약 10,640원(101.1원), 한방 약 10,970원(104.3원). 환자 본인부담은 외래 종별 본인부담률(의원 30%·병원 40%·종합 50%·상급종합 60%, 입원 20%) 적용. 예: 의원 외래 약 3,020원, 병원 외래 약 3,530원.</li>\n<li class=\"sub\">사116 적용대상: 가) 중추·말초신경 또는 근육 손상 후 신경근 재교육, 나) 긴장성 근육통·요통·경부통 등 만성 통증, 다) 자발성 운동장애(강직성 사경, 안면연축, 파킨슨 증후군 등). 등속성운동기구를 제외한 기계·기구로 근력강화운동·기능훈련 30분 이상 실시 시 산정.</li>\n</ul>\n"},{"h":"9. 청구 방법","html":"<ul>\n<li>제7편 관리급여목록의 행위는 선별급여 95%를 적용하여 명세서 진료내역 F항(100분의 95 본인부담)으로 청구한다.</li>\n<li>그 밖의 청구 방식은 다른 이학요법료와 동일하다.</li>\n<li>15회 초과로 예외사유 Y를 적용해 추가 산정할 때 청구명세서 특정내역에 별도 기재할 필요는 없다. 다만 진료기록(시행자·기법·부위·소요시간·치료효과 평가 등) 작성·보존은 필수다.</li>\n</ul>\n"},{"h":"10. 도수치료 관리시스템 (필수 운영)","html":"<ul>\n<li>환자당 연간 실시횟수(타 의료기관 포함)를 조회·관리하고, 진료정보를 건강보험심사평가원에 전송하는 시스템이다.</li>\n<li>API를 이용한 EMR 연계와 웹포털(ef.hira.or.kr)을 통한 제출이 모두 가능하다.</li>\n<li>진료정보가 시스템에 전송되어 있는 경우에만 관리급여가 적용된다. 전송하지 못하면 요양급여비용으로 산정할 수 없다.</li>\n<li>전송 시점: 시행 시점 전송이 원칙이며, 늦어도 환자가 머무는 동안 전송한다. 전송 주체는 진료 담당 인력(의사 또는 물리치료사)이 원칙이나 병원 운영상황에 맞게 정할 수 있다.</li>\n<li>선전송 우선: 다른 기관이 동일 회차(예: 주 2회 초과분, 24회째)를 먼저 전송하면 이후 기관은 전송·인정이 불가하다. 반드시 시행 시점에 전송한다.</li>\n<li>타 기관 횟수 조회: 타 의료기관 실시 횟수를 포함해 조회 가능하며 우리 병원 여부가 표시된다. 의료기관명은 제공되지 않는다.</li>\n<li>예약 건: 미래 날짜로는 등록되지 않는다. 실제 진료일 당일 또는 그 전에 기실시 횟수를 조회한 후 시행 일자로 등록한다.</li>\n<li>삭제 기한: 월~목 진료건은 해당 주 금요일 18시 이전, 금·토·일 진료건은 당일 삭제 가능하다(해당 월 말일이 일요일이 아닌 경우 마지막 주는 진료 당일만). 기한 이후 삭제가 필요하면 심평원 급여전략실 급여전략부(033-739-0313)에 요청한다.</li>\n<li>자격 적용: 시스템 제출 대상은 건강보험·의료급여·보훈이다. 자동차보험·산재보험·건강보험 무자격자는 제출 대상이 아니다.</li>\n<li>로그인: 상용 SW 인증서 또는 건보공단 발급 공동인증서를 심평원 홈페이지에 등록 후 사용한다. 전송 오류 시 재전송한다.</li>\n<li>신포괄지불제도 시범사업 참여 기관도 요양급여 대상 도수치료 실시 시 도수치료 관리시스템을 통해 진료정보를 심평원에 제출해야 한다.</li>\n<li>화면 사용법(접속·등록·입력항목·횟수보기·조회·삭제)은 별도 문서 「현장정리본_도수치료_관리시스템_사용안내.md」 참고.</li>\n</ul>\n"},{"h":"11. 진료기록 의무","html":"<ul>\n<li>처방한 자, 시행자, 시행 기법, 시행 부위, 소요시간, 치료효과 평가 등을 포함하는 기록을 작성·보존해야 한다.</li>\n</ul>\n"},{"h":"12. 비급여로 가능한 경우 / 초과분","html":"<ul>\n<li>질환 치료 목적의 도수치료는 연 인정 횟수를 넘겨 받을 수 없고, 초과분을 비급여로 전환해 청구하는 것도 불가하다.</li>\n<li>질환 치료 목적이 아닌 경우(피로 회복·체형 교정 등 개인적 필요)는 전액 본인부담(비급여)으로 가능하다. 이 경우 건강보험·실손보험은 적용되지 않는다.</li>\n</ul>\n"},{"h":"13. 평가주기","html":"<ul>\n<li>관리급여는 3년 주기로 재평가하며, 재평가 시 급여 유형·전환 원칙 등 세부기준이 추가 마련될 예정이다.</li>\n</ul>\n"},{"h":"14. 자동차보험·산재보험 적용","html":"<ul>\n<li>교통사고 환자(자동차보험)에게 시행하는 도수치료는 건강보험에서 정한 수가(1회 43,850원)와 급여기준을 동일하게 적용한다.</li>\n<li>차이점: 인정횟수는 건강보험의 '연간 총 횟수(연 15회, 예외 24회)'가 아니라 '치료기간 중 총 횟수'로 적용한다.</li>\n<li>시행: 2026년 7월 1일부터, 2026년 7월 1일 진료분부터 적용.</li>\n<li>자동차보험은 도수치료 관리시스템(심평원) 진료정보 제출 대상은 아니다(시스템 제출은 건강보험·의료급여·보훈만). 수가·급여기준만 건강보험과 동일 적용된다.</li>\n<li>근거: 국토교통부 고시 제2025-369호 「자동차보험진료수가에 관한 기준」, 국토교통부 알림(자동차운영보험과-6510, 2026.6.29, 수신: 건강보험심사평가원 자동차보험심사센터장).</li>\n</ul>\n<h3>산재보험(근로복지공단) [확정]</h3>\n<ul>\n<li>2026.7.1 진료분부터 산재보험 도수치료도 건강보험 관리급여 기준을 그대로 적용한다(산재보험 요양급여 산정기준 제4조제3항: 건강보험 개정 규정 시행일부터 건강보험 규정에 따름).</li>\n<li>단가: 기존 68,000원에서 43,850원으로 변경(건강보험 관리급여와 동일). 수가코드도 종전 51040 단일에서 KR001~KR006(종별)으로 변경.</li>\n<li>횟수: 기존 '주 3회·치료기간 중 15회'에서 '주 2회·연 15회'로 변경. 수술·골절 등 관절 구축·강직 시 의사 판단으로 추가 9회(연 24회). 선행치료 2주·4회 요건도 동일 적용. 개정일 이전(2026.1.1~6.30) 실시분도 연간 횟수에 합산.</li>\n<li>본인부담: 산재 환자는 본인부담금 없음(산재보험이 전액 부담). 건강보험 관리급여의 환자 95% 부담과 다른 점이다.</li>\n<li>인력: 기존 '의사 지도·감독하 물리치료사'에서 건강보험과 동일하게 '교육 이수 의사·물리치료사'가 실시(종전 카이로프랙틱 도수치료 제외 기준).</li>\n<li>청구: 진료비명세서 항목번호 0601(관리급여 이학요법료), 산정코드 KR001~006. 연 15회 초과 시 특정내역 기타내역(구분코드 JX999)에 사유 기재(미기재 시 자동조정). 산재 도수치료관리 전산(조회) 시스템 구축 전까지는 고용·산재보험 토탈서비스로 누적 횟수(타 의료기관 합산) 확인.</li>\n<li>근거: 근로복지공단 「(의료기관 안내용) 도수치료 산재보험 업무처리 방법 안내」(보험급여국 요양급여심사부, 2026.6.29), 산재보험 요양급여 산정기준 제4조제3항·별표2.</li>\n</ul>\n"},{"h":"15. 현장 혼선 포인트 점검","html":"<ul>\n<li>7월 1일부터는 환자가 내원 즉시 도수치료를 받을 수 없다. 선행치료 2주·4회 기록을 먼저 확인한다(타 기관·7.1 이전분도 인정). 단 소아 사경, 수술 후 관절운동범위 제한 등은 선행치료 면제로 즉시 시행 가능하다.</li>\n<li>도수치료 관리시스템 미전송 = 산정 불가. 시행 시점 전송을 습관화한다.</li>\n<li>개별 질환의 급여 인정 여부가 모호하면(상병코드 목록이 고시에 없으므로) 처방의 판단과 심평원 안내를 확인한다.</li>\n<li>교육 이수 신고는 보건복지부 안내가 나온 이후 유예기간 종료 시점에 맞춰 진행한다.</li>\n</ul>\n"},{"h":"16. 근거·출처 (공식)","html":"<ul>\n<li>보건복지부 고시 제2026-134호·제2026-135호·제2026-136호·제2026-137호(2026.6.29 공포, 2026.7.1 시행). 보건복지부 누리집 알림 &gt; 법령 &gt; 고시.</li>\n<li>보건복지부 보도자료 「도수치료 회당 4만 원대 수가 적용, 주 2회, 연간 최대 24회로 제한」(2026.6.4): mohw.go.kr 보도자료 list_no=1490729.</li>\n<li>보건복지부 도수치료 관리급여 기준 질의응답_수정(건강보험심사평가원 공지, 2026.6.29, brdBltNo=12133). 6.19 행정예고 별첨 질의응답을 대체하는 최신본이다.</li>\n<li>도수치료 관리시스템: 건강보험심사평가원 요양기관 업무포털 ef.hira.or.kr.</li>\n<li>국토교통부 고시 제2025-369호 「자동차보험진료수가에 관한 기준」(2025.6.30) 및 국토교통부 자동차운영보험과 알림(자동차운영보험과-6510, 2026.6.29).</li>\n</ul>\n"}]},{"slug":"eswt-clinician","label":"체외충격파","title":"체외충격파(ESWT) 치료 가이드 (치료사·의료기관용)","sections":[{"h":"개요","html":"<p>시행: 2026년 7월</p>\n<p>성격: 체외충격파는 도수치료와 달리 관리급여가 아니라 비급여로 유지된다. 7월부터 대한의사협회가 마련한 자율 가이드라인이 시행되며, 강제 고시가 아닌 자율시정 지침이다. 다만 가이드라인을 벗어나면 실손보험 적용이 제한될 수 있고, 비급여 가격·사용량은 모니터링 대상이다.</p>\n<p class=\"src\">근거: 보건복지부 보도참고자료 「체외충격파 의료기관 자율 가이드라인 7월부터 시행」(비급여관리정책협의체 제2차 회의, 2026.6.17), 대한의사협회 근골격계 체외충격파 치료 가이드라인.</p>\n"},{"h":"1. 한눈 요약","html":"<ul>\n<li>시행 횟수: 부위당 최대 6회, 연간 최대 12회 권장. 초과 시 실손보험 적용 제외.</li>\n<li>적응증: 아래 7개 부위 질환으로 한정.</li>\n<li>치료 방법: 1회 최소 2,000타 이상 권장, 주 1회 원칙, 같은 회차에 여러 부위 동시 치료는 불인정.</li>\n<li>비급여 유지(관리급여 아님). 도수치료(관리급여)와는 별개 항목.</li>\n<li>가이드라인 밖 적응증은 의사 판단으로 시행 가능하나 실손 적용이 제한될 수 있어 사전 고지 필요.</li>\n</ul>\n"},{"h":"2. 시행 횟수","html":"<ul>\n<li>부위당 최대 6회, 연간 최대 12회. 횟수 초과 시 실손의료보험 적용에서 제외된다(금융감독원이 실손 분쟁조정기준에 반영 추진).</li>\n<li>여기서 부위는 적응증의 7개 해부학적 부위(어깨관절·팔꿈치관절·고관절·슬관절·발목관절·족부·척추부)를 가리킨다. 부위가 다르면 각각 6회로 본다(예: 어깨 6회와 족부 6회는 별개).</li>\n<li>좌·우 양측을 각각 별개 부위로 보아 각각 6회를 산정하는지는 가이드라인 문언에 명시가 없다. 임상에서는 좌·우 병변을 별개 부위로 보는 것이 일반적이나, 실손 인정 여부는 보험사 심사기준과 금융감독원 분쟁조정기준 해석에 따른다(공식 명시는 없음). [참고]</li>\n<li>동일 회차(같은 날 1회 시술) 내 다부위 동시 치료는 인정하지 않는다. 주 1회 시행이 원칙이다.</li>\n</ul>\n"},{"h":"3. 적응증 (7개 부위 한정)","html":"<ol>\n<li>어깨관절: 석회성 건염, 회전근개 건변증</li>\n<li>팔꿈치관절: 외측상과염, 내측상과염</li>\n<li>고관절: 대전자 통증 증후군</li>\n<li>슬관절: 슬개건염</li>\n<li>발목관절: 아킬레스건염</li>\n<li>족부: 족저근막염</li>\n<li>척추부: 경추·요추부 근막통증증후군</li>\n</ol>\n<p>상기 적응증 외 질환에 대한 체외충격파는 의사의 판단으로 시행할 수 있으나, 실손보험 적용이 제한될 수 있음을 환자에게 사전 고지해야 한다.</p>\n"},{"h":"4. 치료 방법","html":"<ul>\n<li>1회 기준 최소 2,000타 이상 적용 권장.</li>\n<li>주 1회 시행 원칙.</li>\n<li>동일 회차 내 다부위 치료는 인정하지 않는다.</li>\n<li>가이드라인은 집속형·방사형(라디알) 체외충격파를 대상으로 한다. 고강도 레이저(힐트) 등 원리가 다른 장비는 별도 비급여로 분류되어 본 횟수·기준과 분리된다(개별 코드·약관 확인). [참고]</li>\n</ul>\n"},{"h":"5. 금기증 (시행 금지)","html":"<ul>\n<li>출혈성 경향이 있거나 항응고 치료로 출혈 위험이 높은 경우</li>\n<li>치료 부위의 종양(악성·양성 포함), 감염 조직, 임신</li>\n<li>급성 골절, 파열된 건(예: 회전근개 파열, 아킬레스건 파열 등)</li>\n<li>18세 미만 성장판 근처 병변, 금속고정물 주위, 폐조직, 뇌, 척수 부위</li>\n</ul>\n"},{"h":"6. 권고하지 않는 경우","html":"<ul>\n<li>골절 불유합 또는 부정유합 상태</li>\n<li>심혈관 질환</li>\n<li>피부질환</li>\n<li>유착성 피막염(오십견)</li>\n<li>무혈성 괴사</li>\n<li>미상의 건염 등</li>\n</ul>\n"},{"h":"7. 설명 및 동의 (치료 전 필수 고지)","html":"<ul>\n<li>치료 목적 및 기대 효과</li>\n<li>치료 횟수 및 간격</li>\n<li>실손보험 적용 여부 및 제한 사항</li>\n<li>금기증 및 부작용 가능성</li>\n<li>특히 가이드라인에 포함되지 않은 적응증은 실손보험 적용이 제한될 수 있음을 명확히 고지</li>\n<li>표준 동의서 양식과 의무 시점은 가이드라인에 규정되어 있지 않다. 의료기관·학회 안내를 따른다. [참고]</li>\n</ul>\n"},{"h":"8. 도수치료(관리급여)와의 관계","html":"<ul>\n<li>체외충격파는 비급여, 도수치료는 관리급여(본인부담 95%)로 서로 다른 항목이다.</li>\n<li>도수치료와 비급여 체외충격파를 같은 날 병행하는 것은 현행 법체계상 별도 제한은 없으나, 전문학회 가이드라인 준수를 권고하며 동시 시술 행위는 별도 모니터링이 진행될 예정이다(도수치료 질의응답 Q8).</li>\n<li>체외충격파는 도수치료의 선행치료(이학요법료 제1절 기본물리치료료·제2절 단순재활치료료, 2주·4회)로 인정되지 않는다(보건복지부 고시 제2026-136호 도수치료 급여기준 마목, 질의응답 Q18).</li>\n</ul>\n"},{"h":"9. 환자 안내","html":"<ul>\n<li>환자에게 전달할 내용(비용·횟수·적응증·실손·치료 전 설명)은 별도 문서 「현장정리본_체외충격파_환자용.md」 참고.</li>\n</ul>\n"},{"h":"출처","html":"<ul>\n<li>보건복지부 보도참고자료 「체외충격파 의료기관 자율 가이드라인 7월부터 시행」(비급여관리정책협의체 제2차 회의, 2026.6.17)</li>\n<li>대한의사협회 근골격계 체외충격파 치료 가이드라인(대한의사협회 안내 및 홈페이지 공지 예정)</li>\n<li>보건복지부 고시 제2026-136호 도수치료 급여기준 마목; 도수치료 관리급여 질의응답(2026.6.29) Q8·Q18</li>\n</ul>\n"}]},{"slug":"dosu-faq","label":"채팅 FAQ","title":"도수치료·체외충격파 현장 FAQ: 정부 질의응답에 없는 질문과 찾은 답 (각 20선)","sections":[{"h":"개요","html":"<p>[확정]은 정부 고시·질의응답 등 1차 자료로 확인된 사항, [참고]는 관련 법령·기준으로 정리한 사항(개별 확인 권장), [미확인]은 공식 문서에서 답을 찾지 못한 사항이다.</p>\n<hr/>\n"},{"h":"1부. 도수치료 (빈도순 20)","html":"<h3>1. 관리급여 도수(연 15회)는 실손 청구가 되나, 부지급될 수도 있나?</h3>\n<p>[확정·참고] 청구가 된다. 관리급여는 건강보험 급여라서 본인부담 95퍼센트분(약 4만1,660원)이 실손의 급여 보장 대상이 된다. 다만 1세대부터 4세대까지는 급여 자기부담률이 적용되어 부담이 오히려 줄 수 있고, 2026년 5월 6일 나온 5세대는 도수치료를 보장에서 뺐다. 적응증이나 횟수 기준을 못 맞춘 진료는 지급이 거절될 수 있다.</p>\n<p class=\"src\">근거: 금융위원회 실손의료보험 질의응답; 금융감독원 행정지도(행2026-41003); 5세대 실손 표준약관(2026.5.6)</p>\n<h3>2. 실손 세대·통원 한도에 따라 실제 수령액이 어떻게 다른가?</h3>\n<p>[참고] 세대에 따라 크게 갈린다. 1세대부터 4세대는 급여 자기부담률만 부담하여 유리하고, 5세대는 도수치료가 보장에서 빠져 사실상 받지 못한다. 통원 한도와 최소 자기부담금(5세대는 1만~2만원 등)은 약관마다 달라 가입 약관을 직접 확인해야 한다.</p>\n<p class=\"src\">근거: 금융위원회·금융감독원 실손의료보험 안내; 보험사 실손 약관</p>\n<h3>3. 3.3퍼센트 프리랜서나 파트타임도 상근 인력으로 인정되어 도수를 할 수 있나?</h3>\n<p>[확정·참고] 도수 시행자는 해당 요양기관에 상근하는 물리치료사여야 한다(확정). 다만 3.3퍼센트 프리랜서나 파트타임이 상근으로 인정되는지의 세부 기준은 고시에 없고 심평원의 상근 판단을 따른다. 참고로 일반 물리치료 인력 산정에는 주 3일 이상·주 20시간 이상이면 0.5인으로 보는 기준이 있으나, 이것이 도수 상근 요건에 그대로 적용되는지는 확인이 필요하다.</p>\n<p class=\"src\">근거: 보건복지부 고시 제2026-136호 도수치료 급여기준 사목(처방·실시기준); (참고) 요양급여 적용기준 이학요법료 인력 산정 기준</p>\n<h3>4. 연 15회를 다 쓴 뒤 피로·권태 비급여 도수의 금액은 정해져 있나?</h3>\n<p>[확정·참고] 표준 금액은 없고 비급여라 병원이 정한다. 피로회복·체형교정 등 질환 치료 목적이 아닌 도수치료는 건강보험과 실손이 적용되지 않는 비급여이므로(질의응답 Q7·Q14), 가격은 의료기관이 자율로 정하며 정부가 정한 단가는 없다. 비급여 진료비는 모니터링 대상이다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q7·Q14</p>\n<h3>5. 삭감되면 환자에게 환불해야 하나, 금액은 얼마인가?</h3>\n<p>[확정] 삭감되면 환자가 낸 돈을 돌려줘야 하고, 그 부담은 사실상 병원이 진다. 심사에서 과다 본인부담이 확인되면 공단이 병원에 줄 요양급여비용에서 그 금액을 정산해 환자에게 환급한다. 환자가 낸 95퍼센트분(약 4만1,660원)도 환급 대상이라 병원은 인건비를 쓰고도 수익을 얻지 못한다.</p>\n<p class=\"src\">근거: 국민건강보험법 제47조(요양급여비용의 청구와 지급) 및 과다본인부담금 환급 절차</p>\n<h3>6. 무엇을 근거로 삭감하며 어떻게 다투나?</h3>\n<p>[확정] 삭감 근거는 고시 급여기준이고, 병원은 단계별로 다툴 수 있다. 횟수·선행·기록 요건이 근거이며, 처방한 자·시행자·시행기법·시행부위·소요시간·치료효과평가를 적어 보존해야 한다. 이의가 있으면 심평원 재심사조정청구, 그다음 이의신청과 심판청구(건강보험분쟁조정위원회), 행정소송으로 다툰다.</p>\n<p class=\"src\">근거: 보건복지부 고시 제2026-136호 도수치료 급여기준 아목(기록 작성·보존); 심평원 질의응답 수정본(2026.6.29) Q27; 심평원 재심사조정청구 및 국민건강보험법 제87조·제88조(이의신청·심판청구)</p>\n<h3>7. 안면마비 전기자극치료(EST)도 선행 면제·도수 적용 대상인가?</h3>\n<p>[확정] 도수 대상이 아니다. 도수치료 급여는 근골격계 질환에만 인정되므로(질의응답 Q4), 안면마비 전기자극치료(EST)는 도수가 아니라 별도의 전기자극 행위다. 즉시 도수가 가능한 선행 면제 대상은 소아의 사경과 수술 후 관절운동범위 제한으로 한정되어(질의응답 Q21) 안면마비는 포함되지 않는다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q4·Q21</p>\n<h3>8. 수술 후 도수는 수술 후 몇 개월까지 선행 면제인가?</h3>\n<p>[확정·미확인] 기간 상한은 정해져 있지 않다. 수술 후 관절운동범위 제한으로 시행하면 의사의 의학적 판단에 따라 즉시 도수가 가능하지만(질의응답 Q21), 며칠이나 몇 개월까지인지는 고시와 질의응답에 없어 의사의 판단과 기록으로 정한다. 퇴행성 질환 수술이 면제 대상인지도 공식 문서에 명시가 없다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q21; 보건복지부 고시 제2026-136호 도수치료 급여기준 아목</p>\n<h3>9. 기존 도수 환자도 횟수가 리셋되나, 받은 횟수가 차감되나?</h3>\n<p>[확정] 7월 1일부터 새로 센다. 2026년은 7월 1일부터 12월 31일까지 15회(예외 사유 시 24회)로 적용되고(질의응답 Q11), 6월 30일까지 받은 도수는 비급여라 이 횟수에 합산되지 않는다. 7월 1일 이전에 받은 기본물리치료·단순재활치료는 선행으로 인정된다(질의응답 Q19).</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q11·Q19</p>\n<h3>10. 자보·산재 도수 횟수와 건강보험 도수 횟수는 따로 세나?</h3>\n<p>[확정] 따로 센다. 산재 도수는 7월 1일 진료분부터 건강보험 기준을 그대로 따라 단가 4만3,850원, 주 2회·연 15회로 바뀌고 산재 환자는 본인부담이 없다. 산재는 산재대로 연 15회(개정 전 산재 도수와 타 기관 산재 도수를 합산)를 세고, 건강보험은 도수치료관리시스템으로 따로 세며 자보·산재는 이 시스템 제출 대상이 아니므로(질의응답 Q31) 두 보험의 횟수는 합쳐지지 않는다. 자동차보험도 단가는 건강보험과 같게 정렬되며, 횟수 기준은 자보 고시를 따로 확인해야 한다.</p>\n<p class=\"src\">근거: 근로복지공단 도수치료 산재보험 업무처리 안내(2026.6.29); 심평원 질의응답 수정본(2026.6.29) Q31; 국토교통부 자동차보험 진료수가 고시(제2025-369호)</p>\n<h3>11. 비급여 도수를 하려면 면세사업자가 과세사업자로 전환해야 하나?</h3>\n<p>[참고] 치료가 아닌 목적이면 과세 대상이 될 수 있다. 의료기관 진료는 부가세 면세이지만, 피로·체형교정 같은 비치료 목적 비급여는 미용·성형처럼 과세로 본다. 과세 진료를 하면 과세사업자로 전환(공급가의 10퍼센트 부가세 징수)해야 하고, 사업 개시 후 20일 안에 신청한다. 구체적 적용은 세무 확인이 필요하다.</p>\n<p class=\"src\">근거: 부가가치세법 제26조(면세) 및 동법 시행령(미용 목적 진료 과세); 국세청 미용·성형 부가세 과세 사례</p>\n<h3>12. 도수치료와 일반 물리치료(급여)·국소주사를 같은 날 산정할 수 있나?</h3>\n<p>[확정] 일부만 같이 된다. 도수와 마사지치료(사105)는 따로 받지 못하고, 운동치료(사106·116)나 재활기능치료(사130)와 같은 날 하면 둘 중 큰 항목만 인정된다. 외래에서 도수와 국소주사(관절강내·신경간내주사·신경차단술 등)는 각 인정기준에 맞으면 같이 산정된다.</p>\n<p class=\"src\">근거: 보건복지부 고시 제2026-136호 도수치료 급여기준 다목·라목; 심평원 질의응답 수정본(2026.6.29) Q17·Q22</p>\n<h3>13. 크라이오·고주파(윈백)·신장분사에 도수를 묶어도 되나, 실손이 되나?</h3>\n<p>[참고] 권하지 않는다. 급여 도수와 비급여를 같이 하는 것을 직접 막지는 않지만 동시 시술은 별도 모니터링이 진행될 예정이다(질의응답 Q8). 비급여를 실손 받으려 도수에 끼워 넣으면 보험사 지급 거절과 현장조사 위험이 있고, 급여 도수의 본인부담을 비급여로 둔갑시키면 부당청구가 된다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q8; 국민건강보험법·의료법 부당청구 일반 기준</p>\n<h3>14. 타 병원에서 받은 선행 물리치료 4회는 어떻게 확인하나?</h3>\n<p>[확정] 환자에게 서류를 받아 확인한다. 선행치료는 한 병원에서만 채울 필요가 없고 타 병원 시행분도 인정된다(질의응답 Q20). 다만 도수치료관리시스템은 타 병원 도수 횟수만 보여 주고(질의응답 Q29·Q30) 선행 물리치료 이력은 조회되지 않으므로, 환자에게 세부내역서나 진료기록을 받아 확인해야 한다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q20·Q29·Q30; 도수치료관리시스템 사용자 매뉴얼</p>\n<h3>15. 한방 침·물리치료는 선행으로 인정되나, 도수 받는 날 병행할 수 있나?</h3>\n<p>[확정] 한방은 선행으로 인정되지 않는다. 선행치료는 이학요법료 제1절 기본물리치료료와 제2절 단순재활치료료 행위만 인정하므로(고시 마목, 질의응답 Q18), 한의사가 처방한 한방 물리치료나 침은 코드 체계가 달라 선행이 되지 않는다. 같은 날 한방 병행은 양·한방 협진과 청구기준을 따로 확인해야 한다.</p>\n<p class=\"src\">근거: 보건복지부 고시 제2026-136호 도수치료 급여기준 마목; 심평원 질의응답 수정본(2026.6.29) Q18</p>\n<h3>16. 과거(수개월·1년 전) 물리치료 이력도 선행으로 인정되나, 기간 제한은?</h3>\n<p>[확정·미확인] 인정되지만 상한은 정해져 있지 않다. 7월 1일 이전에 받은 기본물리치료·단순재활치료도 선행으로 인정된다(질의응답 Q19). 다만 얼마나 오래된 이력까지 인정하는지는 고시와 질의응답에 명시가 없어 공식 기준이 확인되지 않는다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q19</p>\n<h3>17. 4과 외 일반의·타과 의사도 처방할 수 있나?</h3>\n<p>[확정] 교육을 이수해야 가능하다. 도수는 정형외과·신경외과·재활의학과·마취통증의학과 전문의나 관련 교육을 이수한 의사가 처방하고, 그 의사 또는 상근 물리치료사가 실시한다(고시 사목, 질의응답 Q24). 교육과정 신설 전까지는 유예이고, 유예 동안의 처방 범위는 추후 보건복지부 안내를 따른다.</p>\n<p class=\"src\">근거: 보건복지부 고시 제2026-136호 도수치료 급여기준 사목; 심평원 질의응답 수정본(2026.6.29) Q24</p>\n<h3>18. 도수치료를 하려면 무슨 교육을 언제·어디서 이수해야 하나?</h3>\n<p>[확정] 아직 정해지지 않았고 유예 중이다. 의사·물리치료사 교육과정은 대한의사협회 등 협의로 새로 만들 예정이며, 이수증 발급 단체 지정과 준비기간이 필요해 추후 보건복지부 안내 때까지 유예된다. 이후에는 보건의료자원통합신고포털(hurb.or.kr)에 이수 여부를 신고한다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q24</p>\n<h3>19. 6월에 도수와 같은 날 받은 물리치료도 선행으로 인정되나?</h3>\n<p>[미확인] 공식 문서에서 확인되지 않는다. 선행은 이학요법료 제1·2절 행위를 도수 시행 전에 2주(14일) 이상 4회 이상 시행하면 인정되지만(질의응답 Q18), 도수와 같은 날 시행한 물리치료가 선행 횟수에 포함되는지는 고시·질의응답에 명시가 없어 개별 확인이 필요하다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q18(같은 날 시행분 포함 여부 명시 없음)</p>\n<h3>20. 관리급여 도수는 받을 때마다 의사 진료(진찰료)를 동반해야 하나?</h3>\n<p>[확정·참고] 처방은 필요하지만 매번 진찰료가 필수는 아니다. 도수는 4과 전문의나 교육이수 의사의 처방이 있어야 하나(고시 사목), 시행할 때마다 진찰료를 함께 받아야 한다는 규정은 없다. 진찰료는 실제 진찰을 본 경우에만 따로 산정한다.</p>\n<p class=\"src\">근거: 보건복지부 고시 제2026-136호 도수치료 급여기준 사목</p>\n<hr/>\n"},{"h":"2부. 체외충격파 (빈도순 20)","html":"<h3>1. 7월 1일부터 충격파 횟수가 리셋되나, 기존 횟수가 차감되나?</h3>\n<p>[참고] 경과조치가 따로 없어 시행일 이후 기준으로 운영한다. 가이드라인은 부위당 6회·연 12회를 권한다. 기존 횟수를 리셋하는지 차감하는지는 공식 규정이 없고, 실손 적용은 분쟁조정기준과 보험사 안내를 따른다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17)</p>\n<h3>2. 비급여 충격파 횟수를 타 병원·심평원에서 조회·차감하나?</h3>\n<p>[확정] 전국 합산 조회 체계가 없다. 충격파는 급여가 아니라 자율가이드라인(분쟁 심사기준)을 따르므로, 도수치료관리시스템 같은 전국 횟수 차감 장치가 없다. 횟수 관리는 의료기관 기록과 실손 분쟁조정기준으로 이뤄진다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17); 금융감독원 실손 분쟁조정기준</p>\n<h3>3. 비급여 동의서를 7월 1일부터 의무로 받아야 하나, 양식은?</h3>\n<p>[확정·미확인] 설명과 동의는 권고되지만 법정 의무 양식·시점은 정해져 있지 않다. 가이드라인은 치료 전 목적·효과·횟수·간격·실손 적용·금기·부작용을 충분히 설명하고 동의를 받도록 권한다. 표준 양식과 의무 시점은 규정이 없어 의료기관·학회 안내를 따른다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17) 설명·동의 항목</p>\n<h3>4. 충격파 비급여 금액을 타수별로 차등해 받아도 되나, 평균가는?</h3>\n<p>[참고] 비급여라 병원이 정하나 적정성은 점검 대상이다. 충격파는 비급여여서 타수·부위별로 금액을 정할 수 있으나 비급여 모니터링과 실손 분쟁조정 대상이다. 표준가는 없고 심평원 비급여 진료비 정보로 지역별 가격을 볼 수 있다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17); 심평원 비급여 진료비 정보</p>\n<h3>5. 부위당 6회는 좌우를 각각 6회로 보나, 합산인가?</h3>\n<p>[미확인] 공식 문서에서 확인되지 않는다. 가이드라인은 부위당 6회·연 12회로만 정하고 좌우를 각각 보는지 합치는지는 명시하지 않아, 실손 분쟁 때 분쟁조정기준 해석을 따른다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17)(좌우 구분 명시 없음)</p>\n<h3>6. 7개 적응증 외 부위(손목·엄지, 일반 발목 관절통 등)는 불가한가?</h3>\n<p>[확정] 의사 판단으로 할 수 있으나 실손이 제한된다. 가이드라인은 7개 적응증 외 질환도 의사 판단하 시행할 수 있되 실손 적용이 제한될 수 있음을 미리 알리도록 한다. 손목·엄지나 일반 발목 관절통은 7부위에 없어 실손 제한 대상이다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17) 적응증 항목</p>\n<h3>7. 도수치료와 체외충격파를 같은 날 동시 시행·산정할 수 있나?</h3>\n<p>[확정·참고] 막지는 않으나 점검 대상이다. 급여 도수와 비급여 충격파의 병행치료를 별도로 제한하지는 않으나, 동시 시술 행위는 별도 모니터링이 진행될 예정이다(질의응답 Q8). 같은 날 시행·청구의 구체 기준은 추후 점검 결과를 따른다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q8; 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17)</p>\n<h3>8. 충격파 받은 날의 물리치료가 도수 선행으로 인정되나?</h3>\n<p>[참고] 충격파 자체는 선행이 아니다. 도수 선행은 이학요법료 제1·2절 물리치료를 기준으로 하므로(고시 마목, 질의응답 Q18) 비급여인 충격파는 선행 행위가 아니다. 같은 날 받은 물리치료가 따로 선행 요건을 채웠는지로 판단한다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q18; 보건복지부 고시 제2026-136호 도수치료 급여기준 마목</p>\n<h3>9. 주사 후 같은 날 충격파를 할 수 있나?</h3>\n<p>[참고·미확인] 금지 규정은 없으나 점검 대상이 될 수 있다. 주사와 충격파를 같이 하는 것을 막는 규정은 없지만, 실손은 각 항목의 적응증과 약관을 따르고 동시 시술은 모니터링 대상이 될 수 있다.</p>\n<p class=\"src\">근거: 심평원 질의응답 수정본(2026.6.29) Q8; 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17)</p>\n<h3>10. 본인부담(비급여)이면 적응증과 무관하게 어떤 질환이든 가능한가?</h3>\n<p>[확정] 시행은 되나 실손은 제한될 수 있다. 가이드라인은 7개 적응증 외 질환도 의사 판단하 시행할 수 있되 실손 적용이 제한될 수 있다고 한다. 전액 본인부담이면 치료는 가능하나 실손은 받지 못할 수 있다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17) 적응증 항목</p>\n<h3>11. 무료(서비스) 충격파도 환자 유인행위로 불법인가?</h3>\n<p>[확정·참고] 충격파는 비급여라 무료 제공 자체가 곧바로 유인행위가 되지는 않는다. 급여의 본인부담금을 면제·할인하면 의료법 제27조제3항 환자 유인행위로 금지되어 벌칙(제88조) 대상이지만, 비급여 비용의 감면은 유인행위로 보지 않는다는 헌법재판소 결정 취지가 있다. 다만 실손·모니터링 위험은 별개다.</p>\n<p class=\"src\">근거: 의료법 제27조제3항·제88조; 헌법재판소 결정 취지(비급여 비용 감면은 유인행위 불해당, 사건번호 미확인)</p>\n<h3>12. TKR 등 수술 후 충격파가 적응증·실손 적용이 되나?</h3>\n<p>[확정·참고] 7부위 적응증에 맞아야 실손이 된다. 가이드라인의 슬관절 적응증은 슬개건염으로 한정되므로, 수술 후 무릎이라도 슬개건염 등 7부위 적응증에 맞아야 실손 인정 여지가 있고 그 외는 제한될 수 있다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17) 적응증 항목</p>\n<h3>13. 보험사 약관상 충격파·증식·도수 합산 한도가 있나?</h3>\n<p>[참고] 약관마다 다르다. 충격파·증식치료·도수 등 비급여 물리치료의 합산 한도와 자기부담은 보험사 약관이 정하며 세대·상품별로 다르다. 가입 약관을 직접 확인해야 한다.</p>\n<p class=\"src\">근거: 보험사 실손 약관</p>\n<h3>14. 도수 환자만 충격파를 하나, 단독도 되나?</h3>\n<p>[참고] 단독으로도 된다. 충격파는 적응증에 맞으면 도수 여부와 무관하게 단독으로 할 수 있다. 도수와 묶는 것은 병원 운영 방침일 뿐 규정 사항이 아니다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17) 적응증 항목</p>\n<h3>15. 고강도 힐트(레이저)·라디알 등 기기는 충격파로 청구·분류되나?</h3>\n<p>[참고·미확인] 항목이 달라 분리된다. 가이드라인은 집속형·방사형(라디알) 체외충격파를 대상으로 하고, 고강도 레이저(힐트)는 원리가 다른 별도 비급여라 충격파 횟수·코드와 분리된다. 개별 코드와 약관 확인이 필요하다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17); 비급여 항목 분류(개별 확인)</p>\n<h3>16. 충격파 비급여 전환 시 과세·세금 문제가 생기나?</h3>\n<p>[참고] 비치료 목적이면 과세될 수 있다. 치료 목적이면 면세이나, 미용 등 비치료 목적 비급여는 과세 대상이 될 수 있다. 도수와 같이 과세 진료를 하면 과세사업자 전환과 세무 확인이 필요하다.</p>\n<p class=\"src\">근거: 부가가치세법 제26조(면세) 및 동법 시행령</p>\n<h3>17. 충격파도 도수처럼 향후 관리급여로 규제될 가능성이 있나?</h3>\n<p>[참고] 모니터링 후 결정될 수 있다. 정부는 충격파를 관리급여와 함께 가격·사용량을 모니터링하겠다고 밝혔다. 추가 규제(가격·횟수 제도화) 여부는 모니터링 결과를 따른다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17); 비급여관리정책협의체 회의 자료</p>\n<h3>18. 충격파를 다른 비급여에 묶어 시행하면 실손이 지급되나?</h3>\n<p>[참고] 권하지 않는다. 비급여를 실손 받으려 다른 항목에 녹이면 보험사 지급 거절·현장조사·분쟁 위험이 있다. 비급여 비용 감면 자체는 유인행위로 보지 않지만, 허위·축소 청구는 별개의 위법이다.</p>\n<p class=\"src\">근거: 헌법재판소 결정 취지(비급여 비용 감면 관련); 요양급여·실손 부당청구 일반 기준</p>\n<h3>19. 6.16~7.16 신규 국회 청원에 체외충격파 횟수 제한도 포함돼 있나?</h3>\n<p>[확정] 포함된다. 신규 국회 국민동의청원(2026.6.16~7.16)은 도수치료 관리급여화 고시와 체외충격파 횟수 제한 정책의 철회·시행유예를 함께 요구한다. 동의 진행 상황은 수시로 바뀐다.</p>\n<p class=\"src\">근거: 국회 국민동의청원(2026.6.16~7.16)</p>\n<h3>20. 충격파 비급여 동의를 받지 않으면 분쟁·심사에서 불이익이 있나?</h3>\n<p>[참고] 실손 분쟁에서 불리할 수 있다. 가이드라인은 설명·동의를 권하고 금융감독원이 이를 실손 분쟁조정기준에 반영한다. 설명·동의가 부실하면 분쟁·민원에서 불리할 수 있으나, 별도 법정 제재 규정은 없다.</p>\n<p class=\"src\">근거: 비급여관리정책협의체 체외충격파 자율가이드라인(2026.6.17); 금융감독원 실손 분쟁조정기준</p>\n<hr/>\n"},{"h":"출처 일람 (근거로 삼은 자료)","html":"<ol>\n<li>보건복지부 고시 제2026-134호(건강보험 행위 급여·비급여 목록표 및 급여 상대가치점수 일부개정), 제2026-135호(선별급여 지정·실시 등에 관한 기준 일부개정), 제2026-136호(요양급여의 적용기준 및 방법에 관한 세부사항 일부개정: 2026.6.29 발령·2026.7.1 시행, 도수치료 급여기준 가목부터 아목), 제2026-137호(요양급여비용 청구방법·심사청구서·명세서 서식).</li>\n<li>건강보험심사평가원, 도수치료 관리급여 질의응답 수정본(2026.6.29, Q1부터 Q39).</li>\n<li>건강보험심사평가원, 도수치료관리시스템 사용자 매뉴얼(2026.6.29).</li>\n<li>비급여관리정책협의체, 근골격계 체외충격파치료 자율 가이드라인(2026.6.17).</li>\n<li>근로복지공단, 관리급여 도수치료 산재보험 업무처리 방법 의료기관 안내용(2026.6.29).</li>\n<li>국토교통부, 자동차보험 진료수가에 관한 기준 고시(제2025-369호). 도수치료 단가 정렬분이며, 인정횟수 세부 기준은 자보 고시 본문 확인이 필요하다.</li>\n<li>부가가치세법 제26조(면세) 및 동법 시행령(미용 목적 진료 과세); 국세청 미용·성형 부가세 과세 사례.</li>\n<li>국민건강보험법 제47조(요양급여비용의 청구와 지급) 및 과다본인부담금 환급 절차; 제87조·제88조(이의신청·심판청구).</li>\n<li>의료법 제27조제3항(영리목적 환자 유인·알선 금지)·제88조(벌칙); 헌법재판소 결정 취지(비급여 비용 감면은 유인행위로 보지 않음, 사건번호 미확인).</li>\n<li>금융위원회 실손의료보험 질의응답; 금융감독원 행정지도(행2026-41003) 및 실손의료보험 분쟁조정기준; 5세대 실손 표준약관(2026.5.6); 보험사 실손 약관.</li>\n<li>건강보험심사평가원 비급여 진료비 정보; 요양급여 적용기준 이학요법료 인력 산정 기준(참고).</li>\n<li>국회 국민동의청원(2026.6.16부터 7.16).</li>\n</ol>\n<p>비고: 정부 질의응답과 고시가 직접 답한 사항(단가 4만3,850원, 본인부담률 95퍼센트, 주 2회·연 15회·예외 24회, 1일 1회, 선행 2주(14일)·4회, 동시 산정 불가 항목, 소아 사경 및 수술 후 관절운동범위 제한 선행 면제, 도수치료관리시스템 전송·삭제기한, 신포괄 제출 등)은 별도 정리본(도수치료 치료사용·환자용, 관리시스템 사용안내, 체외충격파 치료사용·환자용)을 참고한다. [참고]와 [미확인] 항목은 심평원·보건복지부·국세청·해당 보험기관에 개별 확인이 필요하다.</p>\n"}]}]},"patient":{"label":"환자용","subs":[{"slug":"dosu-patient","label":"도수치료","title":"도수치료, 2026년 7월 1일부터 이렇게 바뀝니다 (환자 안내)","sections":[{"h":"개요","html":"<p class=\"src\">근거: 보건복지부 확정고시(2026.6.29, 2026.7.1 시행) 및 보건복지부 보도자료(2026.6.4). 아래 내용은 정부 공식 발표 기준입니다.</p>\n"},{"h":"한 줄 요약","html":"<p>도수치료가 2026년 7월 1일부터 건강보험이 적용되는 항목으로 바뀝니다. 다만 비용의 95%(약 41,660원)는 여전히 환자가 내고, 받을 수 있는 횟수와 받기 전에 거쳐야 하는 절차에 새 기준이 생깁니다. 정부가 가격과 횟수를 정해서 관리하는 이 방식을 관리급여라고 합니다.</p>\n"},{"h":"1. 내가 내는 돈","html":"<ul>\n<li>도수치료 1회 가격이 전국 어느 병원이든 43,850원으로 같아집니다. 큰 병원이라고 해서 더 비싸지지 않습니다.</li>\n<li>이 중 95%인 약 41,660원을 환자가 내고, 나머지 약 2,190원을 건강보험이 부담합니다.</li>\n</ul>\n<div class=\"tw\"><table><thead><tr><th>구분</th><th>1회 금액</th></tr></thead><tbody><tr><td>도수치료 가격(전국 동일)</td><td>43,850원</td></tr><tr><td>환자 부담(95%)</td><td>약 41,660원</td></tr><tr><td>건강보험 부담(5%)</td><td>약 2,190원</td></tr></tbody></table></div>\n<ul>\n<li>이전에는 병원마다 가격이 달랐으나(보통 한 회 10만 원 이상인 곳도 많았음), 7월부터는 가격이 통일됩니다.</li>\n</ul>\n"},{"h":"2. 받을 수 있는 횟수","html":"<ul>\n<li>주 2회까지, 1년에 15회까지 건강보험 기준이 적용됩니다.</li>\n<li>수술이나 골절 등으로 관절이 굳거나 뻣뻣한 상태가 뚜렷하면, 의사 판단에 따라 1년에 최대 24회까지 받을 수 있습니다.</li>\n<li>하루에 1회만 인정됩니다. 여러 부위를 받아도 하루 1회입니다.</li>\n<li>횟수는 전국 모든 병원을 합산합니다. 병원을 옮겨도 그동안 받은 횟수가 합쳐집니다.</li>\n<li>연간 기준은 1월 1일부터 12월 31일까지입니다. 2026년은 7월 1일부터 12월 31일까지 15회입니다.</li>\n</ul>\n"},{"h":"3. 도수치료 전에 먼저 받아야 하는 치료가 있습니다","html":"<ul>\n<li>7월부터는 병원에 가서 바로 도수치료를 받을 수 없습니다.</li>\n<li>먼저 기본 물리치료나 단순재활치료를 2주 이상, 4회 이상 받고, 그래도 나아지지 않을 때 도수치료가 건강보험 대상이 됩니다.</li>\n<li>다른 병원에서 먼저 받은 기본 물리치료도 인정되며, 7월 1일 이전에 받은 것도 인정됩니다.</li>\n</ul>\n"},{"h":"4. 건강보험이 적용되지 않는 경우","html":"<ul>\n<li>질환 치료가 아니라 피로 회복, 체형 교정 등 개인적인 목적으로 받는 도수치료는 건강보험이 적용되지 않아 비용을 전부 환자가 냅니다(이렇게 건강보험이 안 되는 경우를 비급여라고 합니다). 이때는 실손보험도 적용되지 않습니다.</li>\n<li>정해진 연간 횟수를 넘긴 질환 치료 목적의 도수치료는 추가로 받을 수 없고, 병원이 초과분을 비급여로 바꿔 청구할 수도 없습니다.</li>\n</ul>\n"},{"h":"5. 실손보험은 어떻게 되나요","html":"<ul>\n<li>환자가 내는 95% 부분을 실손보험으로 돌려받을 수 있는지는, 가입한 실손보험의 가입 시기(흔히 1세대부터 5세대로 나눕니다)와 약관에 따라 다릅니다.</li>\n<li>반드시 본인이 가입한 보험사에 약관을 확인하시기 바랍니다.</li>\n</ul>\n"},{"h":"6. 의료급여·차상위 대상자","html":"<ul>\n<li>의료급여 1종·2종, 차상위계층도 따로 깎아주는 혜택 없이 똑같이 비용의 95%를 환자가 냅니다.</li>\n</ul>\n"},{"h":"7. 병원에서 확인하면 좋은 것","html":"<ul>\n<li>내가 받은 기본 물리치료 횟수가 도수치료 급여 요건(2주·4회)을 채웠는지</li>\n<li>올해 내가 이미 받은 도수치료 횟수(전국 합산 기준)</li>\n<li>내 상태가 연 24회 예외 대상에 해당하는지</li>\n<li>내 실손보험으로 95% 본인부담분을 청구할 수 있는지(보험사 확인)</li>\n</ul>\n"},{"h":"8. 참고","html":"<ul>\n<li>사경(목이 기울어지는 증상) 등에 실시하는 일반 운동요법은 도수치료가 아니라 별도의 건강보험 항목(복합운동치료)으로 처리되어 위 도수치료 기준과 다릅니다. 다만 소아 사경이나 수술 후 관절이 굳은 경우 등에 도수치료를 받는 경우에는, 위 '먼저 받아야 하는 기본 물리치료' 절차 없이 의사 판단으로 바로 받을 수 있습니다. 자세한 적용은 진료 의사에게 확인하시기 바랍니다.</li>\n<li>교통사고로 자동차보험(자보)으로 받는 경우에도 가격(1회 43,850원)과 기준은 건강보험과 같습니다. 다만 횟수는 1년 단위가 아니라 치료 기간 전체의 총 횟수로 봅니다(2026년 7월 1일부터 진료받는 경우).</li>\n<li>업무상 재해로 산재보험으로 받는 경우에도 2026년 7월 1일부터 같은 기준(주 2회·연 15회, 예외 시 24회 등)이 적용됩니다. 다만 산재는 환자가 내는 본인부담금이 없습니다(산재보험이 전부 부담). 가격도 기존 68,000원에서 43,850원으로 바뀌었습니다.</li>\n</ul>\n"},{"h":"출처","html":"<ul>\n<li>보건복지부 보도자료 「도수치료 회당 4만 원대 수가 적용, 주 2회, 연간 최대 24회로 제한」(2026.6.4)</li>\n<li>보건복지부 확정고시 제2026-134호·제2026-135호·제2026-136호·제2026-137호(2026.6.29 공포, 2026.7.1 시행)</li>\n<li>건강보험심사평가원 「도수치료 관리급여 기준 질의응답」(2026.6.29 수정본, 공지 brdBltNo=12133)</li>\n<li>국토교통부 「자동차보험진료수가에 관한 기준」 관련 알림(2026.6.29)</li>\n<li>근로복지공단 「(의료기관 안내용) 도수치료 산재보험 업무처리 방법 안내」(2026.6.29)</li>\n</ul>\n"}]},{"slug":"eswt-patient","label":"체외충격파","title":"체외충격파 치료, 이렇게 됩니다 (환자 안내)","sections":[{"h":"개요","html":"<p class=\"src\">근거: 보건복지부 보도참고자료(2026.6.17) 및 대한의사협회 체외충격파 치료 가이드라인. 아래 내용은 정부와 의사단체의 공식 발표 기준입니다.</p>\n"},{"h":"한 줄 요약","html":"<p>체외충격파는 건강보험이 적용되지 않는 비급여 치료입니다(7월부터 건강보험이 적용되는 도수치료와는 다른 치료입니다). 2026년 7월부터 의사단체가 만든 권장 기준이 시행되며, 한 부위에 6회, 1년에 12회까지가 권장 횟수입니다. 이 횟수를 넘기거나 정해진 부위가 아니면 실손보험에서 보장받지 못할 수 있습니다.</p>\n"},{"h":"1. 비용","html":"<ul>\n<li>체외충격파는 건강보험이 적용되지 않아 가격을 병원이 정합니다. 병원마다 다를 수 있습니다.</li>\n<li>7월부터 건강보험이 적용되는 도수치료와는 별개의 치료입니다.</li>\n</ul>\n"},{"h":"2. 받을 수 있는 횟수 (권장 기준)","html":"<ul>\n<li>한 부위에 최대 6회, 1년에 최대 12회까지가 권장 기준이며, 이를 넘기면 실손보험에서 보장되지 않을 수 있습니다.</li>\n<li>여기서 부위는 어깨·팔꿈치·고관절·무릎·발목·발바닥·척추(목·허리) 7곳을 말합니다. 치료하는 부위가 다르면 각각 6회로 봅니다(예: 어깨 6회와 발바닥 6회는 따로 셉니다).</li>\n<li>왼쪽·오른쪽 양쪽을 각각 6회로 따로 인정하는지는 정부 발표 문서에 분명히 적혀 있지 않습니다. 보통 좌우 병변은 다른 부위로 보지만, 실제 실손 인정은 가입한 보험사 기준에 따라 다르니 보험사에 확인하시기 바랍니다.</li>\n<li>같은 날 한 번에 여러 부위를 치료하는 것은 인정되지 않으며, 보통 주 1회 받습니다.</li>\n</ul>\n"},{"h":"3. 어떤 부위·질환에 받나 (7개 부위)","html":"<ol>\n<li>어깨: 석회성 건염, 회전근개 건염</li>\n<li>팔꿈치: 테니스엘보(바깥쪽), 골프엘보(안쪽)</li>\n<li>엉덩이(고관절): 대전자 통증 증후군</li>\n<li>무릎: 슬개건염(점퍼스 니)</li>\n<li>발목: 아킬레스건염</li>\n<li>발바닥: 족저근막염</li>\n<li>목·허리(척추): 근막통증증후군</li>\n</ol>\n<ul>\n<li>위 7가지에 해당하지 않아도 의사 판단으로 받을 수 있지만, 이 경우 실손보험 적용이 제한될 수 있습니다.</li>\n</ul>\n"},{"h":"4. 실손보험","html":"<ul>\n<li>위 권장 기준(부위·횟수) 안에서 받으면 실손보험으로 돌려받을 수 있고, 기준을 벗어나면 보장이 제한될 수 있습니다.</li>\n<li>실제 보장 여부와 금액은 가입한 실손보험 약관에 따라 다르니, 받기 전에 보험사에 확인하시기 바랍니다.</li>\n</ul>\n"},{"h":"5. 치료 전 의사에게 꼭 들으세요","html":"<ul>\n<li>치료 목적과 기대하는 효과</li>\n<li>몇 회를, 얼마 간격으로 받는지</li>\n<li>내 경우 실손보험이 되는지, 제한이 있는지</li>\n<li>생길 수 있는 부작용과 주의사항</li>\n</ul>\n<p>특히 정해진 7개 부위가 아니면 실손보험이 제한될 수 있다는 점을 미리 확인하세요.</p>\n"},{"h":"6. 이런 경우에는 받지 않거나 먼저 알리세요","html":"<ul>\n<li>임신 중이거나, 치료할 부위에 종양이나 감염이 있는 경우</li>\n<li>피가 잘 멈추지 않거나, 피를 묽게 하는 약(항응고제)을 먹고 있는 경우</li>\n<li>최근에 뼈가 부러졌거나 힘줄이 끊어진 경우(예: 회전근개·아킬레스건 파열)</li>\n<li>자라는 어린이의 성장판 근처</li>\n</ul>\n<p>받기 전에 지금 먹는 약과 몸 상태를 의사에게 알리시기 바랍니다.</p>\n"},{"h":"7. 도수치료와 무엇이 다른가요","html":"<ul>\n<li>도수치료는 7월부터 건강보험이 적용되어 환자가 비용의 95%를 내지만, 체외충격파는 건강보험이 안 되는 비급여로 그대로 남습니다.</li>\n<li>체외충격파를 받았다고 해서, 도수치료를 건강보험으로 받기 전에 거쳐야 하는 기본 물리치료(2주·4회)를 채운 것으로 인정되지는 않습니다.</li>\n</ul>\n"},{"h":"출처","html":"<ul>\n<li>보건복지부 보도참고자료 「체외충격파 의료기관 자율 가이드라인 7월부터 시행」(2026.6.17)</li>\n<li>대한의사협회 근골격계 체외충격파 치료 가이드라인</li>\n</ul>\n"}]}]}},"perfcard":"","rally":"2026-06-28","deadline":"2026-07-04","upd":"7.1 19시 기준"};
