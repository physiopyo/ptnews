습니다.\n\n내일(6월 22일, 월) 대물협과 의협이 직접 만나 구체적인 논의를 진행합니다. 연대가 성사되면 시너지를 위해 시간이나 장소가 일부 조정될 수 있으며, 불가피할 경우 Plan A 장소에서 진행합니다.\n\n회원님들께 드리는 약속 : 주말이라 오늘 의협의 최종 확답을 받기는 어렵습니다. 하지만 분명히 약속드립니다. 내일 의협과의 논의 끝에 동행이 안 된다면, Plan A(6월 28일 14시, 경복궁 동십자각)는 틀림없이 진행됩니다.\n\n이번 집회는 우리의 정당한 권리를 찾기 위한 필수 과정입니다. 답답하셨을 텐데도 믿고 기다려 주신 회원 여러분께 진심으로 감사드립니다. 내일 최종 조율이 끝나는 대로 가장 먼저 공지 올리겠습니다.\n\n우선 6월 28일(일) 일정 비워두시고 조금만 더 지켜봐 주시기 바랍니다. 감사합니다.\n\n김동현 비대위원장 올림","bodyHtml":"안녕하세요. 대한물리치료사협회(이하 '대물협') 및 회원 대표 운영진에서 알려드립니다.\n\n회원 여러분, 많이 기다리셨습니다. 조금 더 빨리 확정된 소식을 전해드리지 못해 죄송합니다. 협회장님과 긴밀히 논의한 끝에 1차 확정안을 먼저 공유드립니다.\n\n<b style=\"color:#FF8A87;font-weight:800;\">[Plan A]</b> 우리의 힘으로 진행한다 : 6월 28일(일) 14:00~16:00, 경복궁 동십자각, 수용 인원 1,000명\n\n<b style=\"color:#7FB2F0;font-weight:800;\">[Plan B]</b> 대한의사협회(이하 '의협')와의 연대 : 6월 28일(일) 16:00~18:00, 대한문 일대, 수용 인원 미정\n\n요약 : Plan A 또는 Plan B로 진행 예정\n\n<b style=\"color:#E9D38A;font-weight:800;\">[협회장님 의견]</b> \"목소리를 더 크고 효과적으로 전달할 수 있다면, 수용 인원 등을 확인한 후 의협과 연대하는 방향도 고려해 보자\"는 제안을 주셨습니다.\n\n내일(6월 22일, 월) 대물협과 의협이 직접 만나 구체적인 논의를 진행합니다. 연대가 성사되면 시너지를 위해 시간이나 장소가 일부 조정될 수 있으며, 불가피할 경우 Plan A 장소에서 진행합니다.\n\n회원님들께 드리는 약속 : 주말이라 오늘 의협의 최종 확답을 받기는 어렵습니다. 하지만 분명히 약속드립니다. 내일 의협과의 논의 끝에 동행이 안 된다면, Plan A(6월 28일 14시, 경복궁 동십자각)는 틀림없이 진행됩니다.\n\n이번 집회는 우리의 정당한 권리를 찾기 위한 필수 과정입니다. 답답하셨을 텐데도 믿고 기다려 주신 회원 여러분께 진심으로 감사드립니다. 내일 최종 조율이 끝나는 대로 가장 먼저 공지 올리겠습니다.\n\n우선 6월 28일(일) 일정 비워두시고 조금만 더 지켜봐 주시기 바랍니다. 감사합니다.\n\n김동현 비대위원장 올림","mq":"안녕하세요. 대한물리치료사협회(이하 '대물협') 및 회원 대표 운영진에서 알려드립니다.<span style=\"display:inline-block;width:64px;\"></span>회원 여러분, 많이 기다리셨습니다. 조금 더 빨리 확정된 소식을 전해드리지 못해 죄송합니다. 협회장님과 긴밀히 논의한 끝에 1차 확정안을 먼저 공유드립니다.<span style=\"display:inline-block;width:64px;\"></span><b style=\"color:#FF8A87;font-weight:800;\">[Plan A]</b> 우리의 힘으로 진행한다 : 6월 28일(일) 14:00~16:00, 경복궁 동십자각, 수용 인원 1,000명<span style=\"display:inline-block;width:64px;\"></span><b style=\"color:#7FB2F0;font-weight:800;\">[Plan B]</b> 대한의사협회(이하 '의협')와의 연대 : 6월 28일(일) 16:00~18:00, 대한문 일대, 수용 인원 미정<span style=\"display:inlin document.addEventListener('click',e=>{const t=e.target.closest('[data-act]');if(!t)return;const a=t.dataset.act;if(a==='carL'||a==='carR'){const sec=t.closest('section');const row=sec&&sec.querySelector('.wheelx');if(row){row.scrollBy({left:Math.round(row.clientWidth*0.8)*(a==='carR'?1:-1),behavior:'smooth'});}return;}if(a==='popbd'){if(t!==e.target)return;ST.pop=false;}else if(a==='notices')ST.noticesOpen=!ST.noticesOpen;else if(a==='ncard'){const i=+t.dataset.i;ST.ncard=ST.ncard===i?-1:i;}else if(a==='lb'){ST.lb=+t.dataset.i;}else if(a==='lbx'){ST.lb=null;}else if(a==='popx'){ST.pop=false;}else if(a==='pophide'){try{localStorage.setItem('ptnews_pop_0628',new Date().toISOString().slice(0,10));}catch(_){}ST.pop=false;}else if(a==='sort'){const r=t.dataset.row;ST.sort[r]=ST.sort[r]==='new'?'old':'new';}else if(a==='expand'){const r=t.dataset.row;ST.expanded=ST.expanded===r?null:r;}render();});
