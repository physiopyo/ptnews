g.com/article/202607108637i","summary":"FDA도 허가한 '이 기술'…통증 관리 대안으로 뜬다, 펄스전자기장 기술에 대한 관심 높아져 25일 용산 전자랜드에서 국내 1회 포럼","ch":"press","tags":[],"pin":false,"dt":"2026-07-10T09:00:00+09:00"},{"title":"Attention Required!","outlet":"쿠키뉴스","author":"","date":"26.07.10","ago":"어제","img":"","url":"https://www.kukinews.com/article/view/kuk202604210067","summary":"","ch":"press","tags":[],"pin":false,"dt":"2026-07-10T04:46:59+09:00"},{"title":"심평원, 비급여 가격 공개·표준화 추진…국민 의료선택권 강화","outlet":"국제뉴스","author":"","date":"26.07.09","ago":"어제","img":"img/pr_a97318e3e06.jpg","url":"https://www.gukjenews.com/news/articleView.html?idxno=3631622","summary":"(원주=국제뉴스) 이현복 기자 = 건강보험심사평가원(원장 홍승권)이 비급여의 정보관리, 이용관리, 사후관리를 연계한 비급여 전주기 관리체계 마련을 본격적으로 추진한다.심평원에 따르면 비급여가 의료현장의 자율성에 따라 운영돼 왔으나 일부 항목의 가격 편차와 실손보험으로 인한 의료이용 증가로 국민의 의료비 부담이 지속적으로 제기돼 왔다.이에 따라 심평원은 국민이 충분한 정보를 바탕으로 합리적으로 선택할 수 있도록 비급여 관리체계를 구축하고, 이용현황을 분석해 문제 상황을 찾아내며 적정 이용을 유도할 계획이다. 또한 효과성 재평가를 강화","ch":"press","tags":[],"pin":false,"dt":"2026-07-09T22:03:03+09:00"},{"title":"체외충격파 실손 청구, 연간 12회만 허용된다","outlet":"MSN","author":"","date":"26.07.09","ago":"어제","img":"","url":"https://www.msn.com/ko-kr/news/other/%EC%B2%B4%EC%99%B8%EC%B6%A9%EA%B2%A9%ED%8C%8C-%EC%8B%A4%EC%86%90-%EC%B2%AD%EA%B5%AC-%EC%97%B0%EA%B0%84-12%ED%9A%8C%EB%A7%8C-%ED%97%88%EC%9A%A9%EB%90%9C%EB%8B%A4/ar-AA26qZuJ","summary":"","ch":"press","tags":[],"pin":false,"dt":"2026-07-09T20:34:13+09:00"},{"title":"도수치료 ‘관리급여’ 적용… 회당 4만3850원·연 15회 제한","outlet":"hidomin.com","author":"","date":"26.07.09","ago":"어제","img":"img/pr_a0856bc6141.jpg","url":"https://www.hidomin.com/news/articleView.html?idxno=712723","summary":"1일부터 도수치료에 관리급여가 적용됐다. 도수치료 가격은 상급종합병원에서든, 동네 의원에서든 4만3850원의 동일한 가격으로 본인부담률 95%를 적용한다. 보건복","ch":"press","tags":[],"pin":false,"dt":"2026-07-09T19:52:19+09:00"},{"title":"심평원, 비급여 전주기 관리체계 본격 추진…‘도수치료’ 첫 사례","outlet":"위클리서울","author":"","date":"26.07.09","ago":"어제","img":"img/pr_a70a26ab76c.jpg","url":"https://www.weeklyseoul.net/news/articleView.html?idxno=86437", ],"pin":false,"dt":"2026-07-09T09:00:00+09:00"},{"title":"비급여 정보·이용부터 사후관리까지 전주기 관리","outlet":"브릿지경제","author":"","date":"26.07.09","ago":"2일 전","img":"img/pr_a394cf8575b.jpg","url":"https://www.viva100.com/article/20260709501255","summary":"국민 의료선택권과 합리적 의료 이용을 위해 비급여 항목에 대한 전주기 관리를 추진한다. 건강보험심사평가원은 비급여 정보관리부터 이용관리, 사후관리를 연계해 ‘비급여 전주기 관리체계’를 마련한다고 9일 밝혔다. 그동안 비급여는 과도한 가격편차와 실손보험 등으로 인한 의료","ch":"press","tags":[],"pin":false,"dt":"2026-07-09T09:00:00+09:00"},{"title":"귀신같이 알아챈다, 청년 표심 얻으려다 탈난 정책","outlet":"오마이뉴스","author":"","date":"26.07.09","ago":"2일 전","img":"img/pr_a79756a1c9f.jpg","url":"https://www.ohmynews.com/NWS_Web/View/at_pg.aspx?CNTN_CD=A0003250001&amp;CMPT_CD=P0010&amp;utm_source=naver&amp;utm_medium=newsearch&amp;utm_campaign=naver_news","summary":"‘추진’에서 ‘중단’으로 극적인 상황 반전발단은 작년 12월 대통령의 지시였다. 보건복지부 업무보고에서 대통령은 \"요즘은 (탈모를) 생존의 문제로 받아들이고 있는 것 같다. 건강보험 적용을 검토해 보자\"라고 지시했다. 이에 보건복지부장","ch":"press","tags":[],"pin":false,"dt":"2026-07-09T09:00:00+09:00"},{"title":"심평원, 의료현장에 맡겼던","outlet":"신아일보","author":"","date":"26.07.09","ago":"2일 전","img":"img/pr_a465785f021.jpg","url":"https://www.shinailbo.co.kr/news/articleView.html?idxno=5039437","summary":"건강보험심사평가원(이하 심평원)은 국민의 의료선택권을 보장하고 합리적인 의료 이용 환경을 조성하고자 '비급여 전주기 관리체계'를 본격적으로 추진한다고 9일 밝혔다","ch":"press","tags":[],"pin":false,"dt":"2026-07-09T09:00:00+09:00"},{"title":"도수치료 관리급여 시행…‘AI 기록관리 서비스’ 병원 경영 도우미 기대","outlet":"중앙일보","author":"","date":"26.07.09","ago":"2일 전","img":"img/pr_aab5822f4f2.jpg","url":"https://www.joongang.co.kr/article/25443863","summary":"클라우드 기반 인공지능(AI) 병원 경영 서비스형 소프트웨어(SaaS) 솔루션 ‘메디밴스(MEDIVANCE)’가 도수치료 관리급여 시행에 맞춰 정식 서비스를 확대한다. 지난 7월 1일부터 도수치료 관리급여가 시행되면서 도수치료 인정 횟수, 치료 효과 평가, 시행 기록 등 관리 기준이 강화됐다. 이에 따라 정형외과 등 의료기관에서는 행정과 기록관리 부담이 커지고 있다. 메디밴스는 바뀐 보건복지부 기준에 대응할 수 있도록 AI 기반 기록관리 기능을 제공한다.","ch":"press","tags":[],"pin":false,"dt":"2026-07-09T09:00:00+09:00"},{"title":"도수치료 ‘관리급여 전환’ 의료계 반발 까닭은?새 창 열림","outlet":"ilyosisa.co.kr","author":"","date":"26.07.09","ago":"2일 전","img":"","url":"htt 으며, 중증 재활","ch":"press","tags":[],"pin":false,"dt":"2026-07-09T00:04:00+09:00"},{"title":"대한도수의학회, “도수치료 관리급여는 학문 말살”","outlet":"병원신문","author":"","date":"26.07.08","ago":"2일 전","img":"img/pr_a2985704010.jpg","url":"https://www.khanews.com/news/articleView.html?idxno=247654","summary":"[병원신문=정윤식 기자] 대한도수의학회가 최근 보건복지부가 시행한 도수치료 관리급여 정책을 ‘학문 말살 정책’으로 규정하며 전면적인 고시 개정을 촉구했다.대한도수의학회는 7월 8일 성명서를 통해 지난 1일부터 시행된 도수치료 관리급여는 손해보험사의 이익만을 위한 정책으로, 의사의 진료권과 환자의 의료 선택권을 심각하게 침해하고 있다고 비판했다.해당 고시 시행 이후 신경계 질환자나 중증 재활 환자들이 치료를 중단할 위기에 처했으며 도수치료를 전문으로 하던 병·의원의 폐업과 물리치료사들의 실직이 이어지고 있다는 점을 강조한 도수의학회다","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T23:36:27+09:00"},{"title":"대한도수의학회, 도수치료 관리급여 고시 개정 촉구 성명","outlet":"의약뉴스","author":"","date":"26.07.08","ago":"2일 전","img":"img/pr_a261fb034a0.jpg","url":"http://www.newsmp.com/news/articleView.html?idxno=255927","summary":"대한도수의학회(회장 김경진)는 8일, 성명을 통해 보건복지부가 지난 7월 1일부터 시행한 도수치료 관리급여 고시의 개정을 촉구했다.보건복지부가 비급여관리협의체를 통해 법령을 개정하고 관리급여 정책을 강행함으로써 의사의 진료권과 환자의 의료 선택권 및 건강 추구권을 침해한다는 지적이다.학회는 \"도수치료는 비급여로 운영돼 왔지만 통증 치료의 중요한 영역인 필수의료\"라며 \"관리급여 시행 이후 뇌졸중, 사지마비 등 신경계 질환자와 중증 환자, 소아 재활 환자 등의 도수치료 중단 위기가 발생했다\"고 지적했다.뿐만 아니라 \"다수의 병의원이 도","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T22:13:50+09:00"},{"title":"도수치료비 단일화에 '칼바람'… 현장은 지금 '혼돈 속'","outlet":"reportera.co.kr","author":"","date":"26.07.08","ago":"2일 전","img":"img/pr_aec8acac2cb.jpg","url":"https://www.reportera.co.kr/economy/manual-therapy-management-benefi/","summary":"7월부터 도수치료가 ‘관리급여’ 항목으로 전환됐다. 정부는 과잉진료를 막고 치료 접근성을 높이겠다고 했지만, 현장은 혼선과 충돌로 들끓고 있다.","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T21:00:00+09:00"},{"title":"복지부 \"도수치료 관리급여는 치료 제한 아닌 합리적 관리\"…AI 활용 심사체계도 도입","outlet":"CBC뉴스","author":"","date":"26.07.08","ago":"2일 전","img":"img/pr_a73cfeffb45.jpg","url":"https://www.cbci.co.kr/news/articleView.html?idxno=587586","summary":"[CBC뉴스] 보건복지부는 지난 7일 도수치료 관리급여 제도와 관련한 설명자료를 내고 \"도수치료를 금지하거나 환자의 치료권을 제한하려는 것이 아니라 의학적으로 필요한 치료는 건강보험으로 보장하고, 과잉 이용 우려가 있는 부분은 합리적으로 관리하기 위한 제도\ .kr/news/articleView.html?idxno=165356&sc_word=&sc_word2=","summary":"대한도수의학회가 지난 7월 1일부터 시행된 도수치료 관리급여 제도를 강도 높게 비판하며 제도 폐기를 촉구했다. 학회는 정부가 의학적 근거가 부족한 기준을 일방적으로 도입해 환자의 치료 선택권과 의사의 진료권을 침해하고 있으며, 결과적으로 도수의학 자체를 위축시키는 정책이 될 것이라고 진단했다.대한도수의학회는 8일 성명을 내고 \"도수치료 관리급여는 국민도, 의사도, 정부도 손해를 보는 정책이며 손해보험사만 이익을 보는 제도\"라며 \"보건복지부가 법령까지 개정해 관리급여를 강행하면서 의료인의 진료권과 환자의 의료 선택권, 건강추구권을 침","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T16:57:07+09:00"},{"title":"아파도 도수치료 못 받는다?…복지부, 관리급여 오해 해명","outlet":"뉴스경남","author":"","date":"26.07.08","ago":"2일 전","img":"img/pr_abceb26b859.jpg","url":"https://www.newsgn.com/news/articleView.html?idxno=561259","summary":"7월부터 도수치료가 ‘관리급여’ 항목으로 전환되면서 의료기관들이 도수치료 운영을 중단하거나 대폭 축소하는 움직임을 보이고 있어 환자들의 우려가 커지고 있다.실제 온라인에서는 실손보험 처리가 안 된다거나 일정 횟수가 넘어가면 치료 자체를 못 받는다는 등의 소문까지 돌면서 환자의 치료권이","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T16:10:59+09:00"},{"title":"“도수치료 관리급여 시행 후 병·의원 진료 접고, 물리치료사 일자리 잃고”","outlet":"의사신문","author":"","date":"26.07.08","ago":"2일 전","img":"img/pr_af60c5865b4.jpg","url":"http://www.doctorstimes.com/news/articleView.html?idxno=238949","summary":"도수치료 관리급여 시행 이후 도수치료를 시행하던 병·의원들이 진료를 접고, 물리치료사들은 직장을 잃었으며, 도수치료 전문 의사들도 경영난을 호소하고 있다는 주장이 제기됐다.대한도수의학회는 8일 성명서를 통해 “보건복지부가 지난 1일부터 도수치료 관리급여를 시행했다”며 “관리급여라는 급조 정책으로 의사의 진료권과 환자의 의료 선택권, 건강 추구권까지 침해하고 있다”고 밝혔다.대한도수의학회는 도수치료가 비급여였지만 통증치료의 하나인 필수의료라고 주장했다. 비급여 관리를 한다고 필수의료가 개선되는 것은 아니며, 도수치료 가격과 제공 방식","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T15:51:45+09:00"},{"title":"펫보험 1위 메리츠화재, 법률비용 보장으로 차별화","outlet":"파이낸셜포스트","author":"","date":"26.07.08","ago":"2일 전","img":"img/in_a0750a3553a.jpg","url":"https://www.financialpost.co.kr/news/articleView.html?idxno=265610","summary":"메리츠화재가 펫보험에 민사소송 법률비용 담보를 추가하며 시장 선두 굳히기에 나서고 있다. 동물병원 치료비 중심의 보장에서 나아가 반려견 사고 이후 발생할 수 있는 법적 분쟁 비용까지 보장 범위를 넓히는 모습이다.8일 보험업계에 따르면 메리츠화재는 이달 자사 펫보험 상품인 '펫퍼민트'에","ch":"ins","tags":["보험사"],"pin":false,"dt":"2026-07-08T15:00:00+09:00"},{"title":"“도수치료 획일적 규제는 의사 진료권·환자 선택권 침해”","outlet":"팍스메디컬뉴스","author 면 도수치료를","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:45:00+09:00"},{"title":"제각각이던 도수치료비, 이달부터 1회 4만 3850원 일괄 적용 |","outlet":"포커스경제","author":"","date":"26.07.02","ago":"","img":"","url":"http://www.gungsireong.com/news/articleViewAmp.html?idxno=53765","summary":"","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:38:27+09:00"},{"title":"의협 \"관리급여, 의료접근성 제한 초래…법률·정책 대응 지속\" : 네이트 뉴스","outlet":"데일리안","author":"","date":"26.07.02","ago":"","img":"img/pr_ad35e3d4a2d.jpg","url":"https://news.nate.com/view/20260702n28763","summary":"한눈에 보는 오늘 : 사회 - 뉴스 : 대한의사협회. ⓒ연합뉴스 의사단체가 정부의 도수치료 관리급여 시행을 “비급여 제도를 무력화하는 정책”이라고 비판하며 법률·정책 대응을 이어가겠다고 밝혔다. 청년층 탈모 치료의 건강보험 급여 적용에 대해서는 건강보험 재정과 형평성을 고려할 때 바람직하지","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:24:00+09:00"},{"title":"의협 \"관리급여, 의료접근성 제한 초래…법률·정책 대응 지속\"","outlet":"데일리안","author":"","date":"26.07.02","ago":"","img":"img/pr_a4836281f7c.jpg","url":"https://www.dailian.co.kr/news/view/1662740/","summary":"의사단체가 정부의 도수치료 관리급여 시행을 “비급여 제도를 무력화하는 정책”이라고 비판하며 법률·정책 대응을 이어가겠다고 밝혔다. 청년층 탈모 치료의 건강보험 급여 적용에 대해서는 건강보험 재정과 형평성을 고려할 때 바람직하지 않다며 반대 입장을 분명히 했다.김성근 대한의사협회(의협) 대변인은 2일 서울 용산구 의협회관에서 열린 정례브리핑에서 “정부는 환자","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:23:00+09:00"},{"title":"의협, 관리급여 추가 지정 저지 총력…\"현장 피해 법적 대응\"","outlet":"청년의사","author":"","date":"26.07.02","ago":"","img":"img/pr_a3bbc4ae4ab.jpg","url":"https://www.docdocdoc.co.kr/news/articleView.html?idxno=3040604","summary":"도수치료가 환자 본인부담률 95%의 관리급여로 전환된 지 하루 만에 대한의사협회가 대응 강화를 선언했다. 관리급여 시행으로 발생하는 의료현장과 환자 피해사례를 수집하고 향후 온열치료와 신경성형술, 언어치료 등 추가 관리급여 지정에도 적극 대응하겠다는 방침이다.의협은 2일 오후 정례브리핑에서 관리급여 제도에 대해 \"비급여라는 법적 급여제도를 무력화하기 위해 도입된 무리한 제도\"라며 \"국민 치료권과 의료접근성을 제한하게 될 것\"이라고 지적했다.의협은 관리급여 도입 논의 초기부터 비급여관리정책협의체, 실손보험대책위원회, 비급여조정분과위원","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:22:47+09:00"},{"title":"거리로 나온 물리치료사…혼란의 도수치료","outlet":"MTN 머니투데이방송","author":"","date":"26.07.02","ago":"","img":"img/pr_aa7b32bef39.jpg","url":"https://news.mtn.co.kr/news-detail/2026070216023084139","summary":"도수치료가 관리급여로 전환되면서 물리치료사의 일자리 시장이 위기에 직면했다. 과잉진료와 천차만별인 가격을 바로잡기 위한 정책이지만, 물리치료사 직군에 대한 피해가 충분히 고려되지 못했다는 우려가 나온다. 2일 업계에 따르면 병원 현장에서는 도수치료 운영을 중단하거나 물리치료사에게 퇴직을 권고하는 등 시장 축소 움직임이 나타나고 있다. 이재만 대한정형외과의사회 공보이사는 \"도수치료 가격이 낮아지면서 병원 입장에서는 물리치료사를 고용해서 계속 치료를 이어가기에는 어려운 상황\"이라며 \"도수치료는 물리치료의 전문성을 인정받는 영역","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:13:27+09:00"},{"title":"“치료인가, 마사지인가”…도수치료 개편이 겨누는 진짜 경계선","outlet":"보험저널","author":"","date":"26.07.02","ago":"","img":"img/pr_ae64b85ee35.jpg","url":"https://www.insjournal.co.kr/news/articleView.html?idxno=32127","summary":"도수치료 관리급여 전환을 둘러싼 관심이 1회 수가와 연간 이용 횟수 제한에 집중되고 있다. 하지만 보험업계가 주목해야 할 더 본질적인 쟁점은 도수치료가 어디까지 의학적 치료이고 어디서부터 마사지성 서비스로 분류되느냐는 문제다.보험범죄연구소 박철현 소장은 도수치료와 스포츠 마사지가 기술","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:11:52+09:00"},{"title":"의협 \"관리급여 부당성 알리고 법률적·정책적 대응 지속할 것\"","outlet":"의협신문","author":"","date":"26.07.02","ago":"","img":"img/pr_afa5a8a8fa9.jpg","url":"https://www.doctorsnews.co.kr/news/articleView.html?idxno=165270","summary":"대한의사협회가 7월 1일자로 본격 시행되고 있는 도수치료 관리급여와 관련 의료계의 요구가 충분히 받아들여지지 않은 정책임을 재차 강조했다.특히 관리급여의 부당성을 지속적으로 알리고, 관리급여 시행에 따른 의료현장과 환자 피해를 수집해 개선책을 마련하는 것과 함께, 법률적·정책적 대응을 지속할 계획도 밝혔다.정부는 환자 의료비 부담 경감을 이유로 비급여로 적용하던 도수치료를 7월 1일자로 환자 본인부담 95%의 ‘관리급여’로 강제 적용하고 있다.관리급여 제도는 비급여라는 법적 급여제도를 무력화하기 위","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:07:44+09:00"},{"title":"의협, “도수치료 관리급여 편입 저지 최선 다했으나 역부족”","outlet":"메드월드뉴스","author":"","date":"26.07.02","ago":"","img":"img/pr_a359d9cf049.jpg","url":"http://www.medworld.co.kr/news/articleView.html?idxno=261010","summary":"정부가 환자 의료비 부담 경감을 이유로 비급여로 적용하던 도수치료를 7월 1일 자로 환자 본인부담 95%의 ‘관리급여’로 강제 적용했다. 이에 대해 대한의사협회는 “관리급여 제도는 비급여라는 법적 급여제도를 무력화하기 위해 도입된 무리한 제도로, 의협은 도입 논의 초기부터 적극 대응해왔으나 역부족이었다”며 “향후 국민의 치료권과 의료접근성을 제한하게 될 것”이라고 비판했다.의협 김성근 대변인은 2일 열린 제69차 정례 브리핑에서 이같이 밝히고 “정부는 앞으로 도수치료 이외에도 온열치료, 신경성형술, 언어치료 등 여러 관리급여 대상","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T15:42:15 상임위 회부 단계\n출처 : 동아경제신문 2026.07.02, 뉴스1·청년의사 2026.06.30"},{"badge":"국회 입법","color":"#2E7D5A","date":"4.21","title":"방문재활·통합돌봄 관련 의료기사법 개정안 국회 계류","body":"요지 : 물리치료사 업무의 '의사 지도하' 규정을 '지도 또는 처방'으로 확대해 병원 밖 방문재활을 제도권에서 수행하도록 하는 의료기사법 개정안\n발의 : 남인순(더불어민주당)·최보윤(국민의힘) 공동, 2025년 10월\n소관위원회 : 보건복지위원회(계류)\n경과 : 2026년 4월 21일 국회 소통관에서 노인·장애인·환자·의료기사 단체가 통과 촉구 기자회견. 2026년 3월 전국 시행된 통합돌봄과 연계한 방문재활 제도화 필요성 제기\n쟁점 : 의료계는 안전성·의사 지도 원칙을 들어 이견, 국회 대치\n출처 : 이투데이 2026.04.21, 세계일보 2026.02.26"},{"badge":"국회 일정","color":"#3A6EA5","date":"6.30","title":"국회토론회 「중증질환자 피해사례로 본 실손보험·관리급여 제도의 문제점 및 개선방안」","img":"img/notice_assembly2.jpg","body":"일시 : 2026년 6월 30일(화) 10:00~12:00\n장소 : 국회의원회관 제1세미나실\n주최 : 국회의원 이주영(개혁신당)\n주관 : 대한의사협회, 한국중증질환연합회\n좌장 : 이태연, 사회 : 안치현 (대한의사협회 보험이사)\n발제1 : 관리급여 추진의 문제점과 바람직한 비급여 관리 대안 (이봉근)\n발제2 : 중증질환자 피해사례로 본 실손보험 제도의 문제점 및 개선안 (최태형 변호사)\n이후 환자 피해사례 발표, 지정토론(의료계·환자단체·보험업계·금융계·정부), 질의응답"},{"badge":"국회 일정","color":"#3A6EA5","date":"6.30","title":"「지역사회통합돌봄, 성인지 관점에서의 대안모색」 토론회","img":"img/notice_assembly1.jpg","body":"일시 : 2026년 6월 30일(화) 오전 10시\n장소 : 국회 의원회관 제8간담회실\n주최 : 국회부의장 남인순, 한국여성연구소, 한국여성단체연합\n좌장 : 김희강(고려대 행정학과 교수)\n발표 : 송다영(인천대), 최나리(젠더로 다시 여는 연구소), 백경흔(이화여대)\n토론 : 장수정, 허민숙, 이정아\n안건 : 의료·요양 등 지역 돌봄 통합지원에 관한 법률의 성인지 분석과 개선 방안"},{"badge":"집회 확정","color":"#D8483A","date":"6.22","title":"6.28 집회 'Plan A' 최종 확정 (경복궁 동십자각 14:00)","body":"안녕하세요. 대한물리치료사협회(이하 '대물협') 및 회원 대표 운영진에서 알려드립니다.\n\n대물협과 의협의 논의 끝에, 의협은 의협대로 대물협은 대물협대로 같은 날 각자의 장소에서 목소리를 내기로 최종 결정되었습니다.\n\n이에 저희 집회는 6월 28일 경복궁 동십자각에서 이전에 공지드린 [Plan A]로 진행됩니다.\n\n모두 많이 기다리셨을 텐데, 빠르게 다음 공지 올리겠습니다. 감사합니다.\n\n[Plan A] 우리의 힘으로 진행한다\n날짜 : 2026년 6월 28일(일)\n장소 : 경복궁 동십자각\n시간 : 14:00 ~ 16:00\n수용 인원 : 1,000명"},{"badge":"자유방","color":"#3E9E78","date":"6.22","title":"각 시도회 도수치료 관리급여 대응 현황 제보 요청","body":"각 지역에 계신 물리치료사 회원 여러분께 알려드립니다.\n\n관리급여로 인한 치료사 생존권 위협이 턱 앞까지 다가왔습니다. 우리 생존권을 두고 각 시도 물리치료사회가 회원을 지켜주고 있는지, [도수치료 관리급여]에 대한 각 시도회의 활동 현황을 파악하고자 합니다.\n\n회원님들께서 가입되어 계신 각 지역 밴드·인스타그램·페이스북 등 SNS에 올라온 협회의 활동 소식이나 공지가 있다면 적극적인 제보 부탁드립니다.\n\n제보 내용 : 각 시도회 밴드·인스타 등 SNS의 도수치료 관리급여 관련 활동/공지 캡쳐본, 또는 내부 분위기·내부 관계자 제보 (철저한 익명 보장)\n\n제보 방법 : '바보' 방장에게 개인 카톡\n\n각 시도 물리치료사회가 우리 권익을 위해 어떤 도움을 주고 있는지 파악하려는 취지입니다. 감사합니다."},{"badge":"중앙협회","color":"#8C72D6","date":"6.22","title":"대한물리치료사협회 고용위기대응센터 : 권고사직·고용피해 안내","img":"img/notice_kpta.jpg","body":"대한물리치료사협회 고용위기대응센터 안내입니다. 권고사직·사직서(자진퇴사) 작성 주의, 도수치료 관리급여 고용피해 전문가(노무사) 상담 안내. 노무사 류시나 010-3704-8756."},{"badge":"집회 공지","color":"#D8483A","date":"6.21","title":"6.28 총궐기 1차 확정안 (Plan A·B) 안내","body":"안녕하세요. 대한물리치료사협회(이하 '대물협') 및 회원 대표 운영진에서 알려드립니다.\n\n회원 여러분, 많이 기다리셨습니다. 조금 더 빨리 확정된 소식을 전해드리지 못해 죄송합니다. 협회장님과 긴밀히 논의한 끝에 1차 확정안을 먼저 공유드립니다.\n\n[Plan A] 우리의 힘으로 진행한다 : 6월 28일(일) 14:00~16:00, 경복궁 동십자각, 수용 인원 1,000명\n\n[Plan B] 대한의사협회(이하 '의협')와의 연대 : 6월 28일(일) 16:00~18:00, 대한문 일대, 수용 인원 미정\n\n요약 : Plan A 또는 Plan B로 진행 예정\n\n[협회장님 의견] \"목소리를 더 크고 효과적으로 전달할 수 있다면, 수용 인원 등을 확인한 후 의협과 연대하는 방향도 고려해 보자\"는 제안을 주셨습니다.\n\n내일(6월 22일, 월) 대물협과 의협이 직접 만나 구체적인 논의를 진행합니다. 연대가 성사되면 시너지를 위해 시간이나 장소가 일부 조정될 수 있으며, 불가피할 경우 Plan A 장소에서 진행합니다.\n\n회원님들께 드리는 약속 : 주말이라 오늘 의협의 최종 확답을 받기는 어렵습니다. 하지만 분명히 약속드립니다. 내일 의협과의 논의 끝에 동행이 안 된다면, Plan A(6월 28일 14시, 경복궁 동십자각)는 틀림없이 진행됩니다.\n\n이번 집회는 우리의 정당한 권리를 찾기 위한 필수 과정입니다. 답답하셨을 텐데도 믿고 기다려 주신 회원 여러분께 진심으로 감사드립니다. 내일 최종 조율이 끝나는 대로 가장 먼저 공지 올리겠습니다.\n\n우선 6월 28일(일) 일정 비워두시고 조금만 더 지켜봐 주시기 바랍니다. 감사합니다.\n\n김동현 비대위원장 올림"}],"guide":{"clinician":{"label":"치료사용","subs":[{"slug":"dosu-clinician","label":"도수치료","pages":["guide/img/dosu-clinician-1.png","guide/img/dosu-clinician-2.png","guide/img/dosu-clinician-3.png","guide/img/dosu-clinician-4.png","guide/img/dosu-clinician-5.png","guide/img/dosu-clinician-6.png","guide/img/dosu-clinician-7.png"],"pdf":"guide/img/dosu-clinician.pdf"},{"slug":"eswt-clinician","label":"체외충격파","pages":["guide/img/eswt-clinician-1.png","guide/img/eswt-clinician-2.png","guide/img/eswt-clinician-3.png"],"pdf":"guide/img/eswt-clinician.pdf"},{"slug":"faq","label":"채팅 FAQ","pages":["guide/img/dosu-faq-1.png","guide/img/dosu-faq-2.png", function sparkSVG(arr){if(!arr||!arr.length)return '';var w=260,h=42,n=arr.length;var pts=arr.map(function(v,i){var x=(n<2?0:(i/(n-1))*w);var y=h-3-(Math.max(0,Math.min(100,v))/100)*(h-8);return x.toFixed(1)+','+y.toFixed(1);}).join(' ');return '<svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:42px;display:block"><polyline points="'+pts+'" fill="none" stroke="#c0392b" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/></svg>';}
function buzzChartSVG(dates, values, color, unit, zoom){
  if(!dates.length||!values.length) return '<div style="color:#8c8c8c;font-size:14px;padding:30px;text-align:center;">데이터 없음</div>';
  var n=dates.length, W=900, H=270, pl=46, pr=18, pt=14, pb=28;
  var mx=Math.max.apply(null, values); if(!(mx>0)) mx=1; var ymax=(Math.ceil(mx/10)*10||10)/(zoom||1); if(ymax<1)ymax=1;
  function X(i){return pl+(n<=1?0:i/(n-1)*(W-pl-pr));}
  function Y(v){return H-pb-(v/ymax)*(H-pt-pb);}
  function fmt(v){v=Math.round(v);return v>=1000?(v/1000).toFixed(v>=10000?0:1)+'k':(''+v);}
  var grid='';
  [0,0.5,1].forEach(function(f){var val=ymax*f;var y=Y(val);grid+='<line x1="'+pl+'" y1="'+y.toFixed(1)+'" x2="'+(W-pr)+'" y2="'+y.toFixed(1)+'" stroke="rgba(0,0,0,.07)"/><text x="'+(pl-6)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" font-size="13" fill="#8c8c8c">'+fmt(val)+'</text>';});
  var dpath=values.map(function(v,i){return (i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1);}).join(' ');
  var area='M'+X(0).toFixed(1)+' '+(H-pb)+' '+values.map(function(v,i){return 'L'+X(i).toFixed(1)+' '+Y(v).toFixed(1);}).join(' ')+' L'+X(n-1).toFixed(1)+' '+(H-pb)+' Z';
  var dots='', hov='', sw=(n>1?(W-pl-pr)/(n-1):W);
  values.forEach(function(v,i){var x=X(i),y=Y(v);if(i%9===0||i===n-1)dots+='<circle cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="2.6" fill="'+color+'"/>';var dt=(dates[i]||'').slice(5).replace('-','.');var lbl=(unit==='지수')?('지수 '+v):(v.toLocaleString('ko-KR')+'건');hov+='<rect x="'+(x-sw/2).toFixed(1)+'" y="'+pt+'" width="'+sw.toFixed(1)+'" height="'+(H-pt-pb)+'" fill="transparent" data-tip="'+dt+' · '+lbl+'"/>';});
  var xlab='';
  [0,Math.floor(n/4),Math.floor(n/2),Math.floor(n*3/4),n-1].forEach(function(i){var dt=(dates[i]||'').slice(5).replace('-','.');xlab+='<text x="'+X(i).toFixed(1)+'" y="'+(H-9)+'" text-anchor="'+(i===0?'start':i===n-1?'end':'middle')+'" font-size="13" fill="#8c8c8c">'+dt+'</text>';});
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block;overflow:hidden;"><defs><linearGradient id="bzg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+color+'" stop-opacity="0.28"/><stop offset="1" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'+grid+'<path d="'+area+'" fill="url(#bzg)" stroke="none"/><path d="'+dpath+'" fill="none" stroke="'+color+'" stroke-width="2.2" stroke-linejoin="round"/>'+dots+xlab+hov+'</svg>';
}
function buzzMultiSVG(dates, series, unit, hourly, zoom){
  if(!dates.length||!series.length) return '<div style="color:#8c8c8c;font-size:14px;padding:30px;text-align:center;">데이터 없음</div>';
  var n=dates.length, W=900,H=270,pl=46,pr=18,pt=14,pb=28;
  var mx=0; series.forEach(function(s){(s.values||[]).forEach(function(v){if(v>mx)mx=v;});}); if(!(mx>0))mx=1; var ymax=(Math.ceil(mx/10)*10||10)/(zoom||1); if(ymax<1)ymax=1;
  function X(i){return pl+(n<=1?0:i/(n-1)*(W-pl-pr));}
  function Y(v){return H-pb-(v/ymax)*(H-pt-pb);}
  function fmt(v){v=Math.round(v);return v>=1000?(v/1000).toFixed(v>=10000?0:1)+'k':(''+v);}
  var grid='';
  [0,0.5,1].forEach(function(f){var val=ymax*f;var y=Y(val);grid+='<line x1="'+pl+'" y1="'+y.toFixed(1)+'" x2="'+(W-pr)+'" y2="'+y.toFixed(1)+'" stroke="rgba(0,0,0,.07)"/><text x="'+(pl-6)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" font-size="13" fill="#8c8c8c">'+fmt(val)+'</text>';});
  var lines='';
  series.forEach(function(s){var vals=s.values||[];var d=vals.map(function(v,i){return (i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1);}).join(' ');lines+='<path d="'+d+'" fill="none" stroke="'+s.color+'" stroke-width="2.2" stroke-linejoin="round"/>';vals.forEach(function(v,i){if(n<=31||i===n-1){lines+='<circle cx="'+X(i).toFixed(1)+'" cy="'+Y(v).toFixed(1)+'" r="'+(n<=2?3.6:2.6)+'" fill="'+s.color+'"/>';}});});
  var hov='', sw=(n>1?(W-pl-pr)/(n-1):W);
  for(var i=0;i<n;i++){var dt=hourly?(dates[i]||'').slice(5):(dates[i]||'').slice(5).replace('-','.');var parts=series.map(function(s){return s.name+' '+((s.values||[])[i]||0);}).join(' · ');hov+='<rect x="'+(X(i)-sw/2).toFixed(1)+'" y="'+pt+'" width="'+sw.toFixed(1)+'" height="'+(H-pt-pb)+'" fill="transparent" data-tip="'+dt+' · '+parts+'"/>';}
  var xlab='';
  [0,Math.floor(n/4),Math.floor(n/2),Math.floor(n*3/4),n-1].forEach(function(i){var dt=hourly?((dates[i]||'').split(' ')[1]||''):(dates[i]||'').slice(5).replace('-','.');xlab+='<text x="'+X(i).toFixed(1)+'" y="'+(H-9)+'" text-anchor="'+(i===0?'start':i===n-1?'end':'middle')+'" font-size="13" fill="#8c8c8c">'+dt+'</text>';});
