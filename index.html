ws/articleView.html?idxno=3040784","summary":"관리급여 도입이 재활치료 제한은 아니라는 보건복지부 해명에 대한도수의학회가 정면 반박했다. 제도 시행 일주일 만에 피해 사례가 속출하고 있다며 지금이라도 관련 고시를 수정하라고 했다. 정부의 잘못된 정책으로 도수의학이 위축됐다며","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T17:34:01+09:00"},{"title":"“졸업하면 어디로 가나요”…도수치료 규제에 멍드는 물리치료학과생","outlet":"경기일보","author":"","date":"26.07.08","ago":"7일 전","img":"img/pr_adf1cbfcdba.jpg","url":"https://v.daum.net/v/20260708170630505","summary":"“도수치료사를 꿈꿨는데 졸업하면 어디로 취업해야 할지 막막합니다.” 보건복지부가 이달부터 도수치료를 건강보험 관리급여로 전환해 진료비 상한과 치료 횟수 등을 제한하자 물리치료학과 학생들이 동요하고 있다. 일선 병원 현장에서 잇따라 도수치료를 중단하고 있기 때문인데, 특히 도수치료 인기에 힘입어 관련 전문대학들이 내년부터 물리치료학과 4년제 전환을","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T17:06:30+09:00"},{"title":"도수의학회 \"관리급여는 도수의학 말살 정책\" 즉각 폐기 촉구","outlet":"의협신문","author":"","date":"26.07.08","ago":"7일 전","img":"img/pr_a0450db8446.jpg","url":"https://www.doctorsnews.co.kr/news/articleView.html?idxno=165356&sc_word=&sc_word2=","summary":"대한도수의학회가 지난 7월 1일부터 시행된 도수치료 관리급여 제도를 강도 높게 비판하며 제도 폐기를 촉구했다. 학회는 정부가 의학적 근거가 부족한 기준을 일방적으로 도입해 환자의 치료 선택권과 의사의 진료권을 침해하고 있으며, 결과적으로 도수의학 자체를 위축시키는 정책이 될 것이라고 진단했다.대한도수의학회는 8일 성명을 내고 \"도수치료 관리급여는 국민도, 의사도, 정부도 손해를 보는 정책이며 손해보험사만 이익을 보는 제도\"라며 \"보건복지부가 법령까지 개정해 관리급여를 강행하면서 의료인의 진료권과 환자의 의료 선택권, 건강추구권을 침","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T16:57:07+09:00"},{"title":"아파도 도수치료 못 받는다?…복지부, 관리급여 오해 해명","outlet":"뉴스경남","author":"","date":"26.07.08","ago":"7일 전","img":"img/pr_abceb26b859.jpg","url":"https://www.newsgn.com/news/articleView.html?idxno=561259","summary":"7월부터 도수치료가 ‘관리급여’ 항목으로 전환되면서 의료기관들이 도수치료 운영을 중단하거나 대폭 축소하는 움직임을 보이고 있어 환자들의 우려가 커지고 있다.실제 온라인에서는 실손보험 처리가 안 된다거나 일정 횟수가 넘어가면 치료 자체를 못 받는다는 등의 소문까지 돌면서 환자의 치료권이","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T16:10:59+09:00"},{"title":"“도수치료 관리급여 시행 후 병·의원 진료 접고, 물리치료사 일자리 잃고”","outlet":"의사신문","author":"","date":"26.07.08","ago":"7일 전","img":"img/pr_af60c5865b4.jpg","url":"http://www.doctorstimes.com/news/articleView.html?idxno=238949","summary":"도수치료 관리급여 시행 이후 도 body":"안녕하세요. 대한물리치료사협회(이하 '대물협') 및 회원 대표 운영진에서 알려드립니다.\n\n대물협과 의협의 논의 끝에, 의협은 의협대로 대물협은 대물협대로 같은 날 각자의 장소에서 목소리를 내기로 최종 결정되었습니다.\n\n이에 저희 집회는 6월 28일 경복궁 동십자각에서 이전에 공지드린 [Plan A]로 진행됩니다.\n\n모두 많이 기다리셨을 텐데, 빠르게 다음 공지 올리겠습니다. 감사합니다.\n\n[Plan A] 우리의 힘으로 진행한다\n날짜 : 2026년 6월 28일(일)\n장소 : 경복궁 동십자각\n시간 : 14:00 ~ 16:00\n수용 인원 : 1,000명"},{"badge":"자유방","color":"#3E9E78","date":"6.22","title":"각 시도회 도수치료 관리급여 대응 현황 제보 요청","body":"각 지역에 계신 물리치료사 회원 여러분께 알려드립니다.\n\n관리급여로 인한 치료사 생존권 위협이 턱 앞까지 다가왔습니다. 우리 생존권을 두고 각 시도 물리치료사회가 회원을 지켜주고 있는지, [도수치료 관리급여]에 대한 각 시도회의 활동 현황을 파악하고자 합니다.\n\n회원님들께서 가입되어 계신 각 지역 밴드·인스타그램·페이스북 등 SNS에 올라온 협회의 활동 소식이나 공지가 있다면 적극적인 제보 부탁드립니다.\n\n제보 내용 : 각 시도회 밴드·인스타 등 SNS의 도수치료 관리급여 관련 활동/공지 캡쳐본, 또는 내부 분위기·내부 관계자 제보 (철저한 익명 보장)\n\n제보 방법 : '바보' 방장에게 개인 카톡\n\n각 시도 물리치료사회가 우리 권익을 위해 어떤 도움을 주고 있는지 파악하려는 취지입니다. 감사합니다."},{"badge":"중앙협회","color":"#8C72D6","date":"6.22","title":"대한물리치료사협회 고용위기대응센터 : 권고사직·고용피해 안내","img":"img/notice_kpta.jpg","body":"대한물리치료사협회 고용위기대응센터 안내입니다. 권고사직·사직서(자진퇴사) 작성 주의, 도수치료 관리급여 고용피해 전문가(노무사) 상담 안내. 노무사 류시나 010-3704-8756."},{"badge":"집회 공지","color":"#D8483A","date":"6.21","title":"6.28 총궐기 1차 확정안 (Plan A·B) 안내","body":"안녕하세요. 대한물리치료사협회(이하 '대물협') 및 회원 대표 운영진에서 알려드립니다.\n\n회원 여러분, 많이 기다리셨습니다. 조금 더 빨리 확정된 소식을 전해드리지 못해 죄송합니다. 협회장님과 긴밀히 논의한 끝에 1차 확정안을 먼저 공유드립니다.\n\n[Plan A] 우리의 힘으로 진행한다 : 6월 28일(일) 14:00~16:00, 경복궁 동십자각, 수용 인원 1,000명\n\n[Plan B] 대한의사협회(이하 '의협')와의 연대 : 6월 28일(일) 16:00~18:00, 대한문 일대, 수용 인원 미정\n\n요약 : Plan A 또는 Plan B로 진행 예정\n\n[협회장님 의견] \"목소리를 더 크고 효과적으로 전달할 수 있다면, 수용 인원 등을 확인한 후 의협과 연대하는 방향도 고려해 보자\"는 제안을 주셨습니다.\n\n내일(6월 22일, 월) 대물협과 의협이 직접 만나 구체적인 논의를 진행합니다. 연대가 성사되면 시너지를 위해 시간이나 장소가 일부 조정될 수 있으며, 불가피할 경우 Plan A 장소에서 진행합니다.\n\n회원님들께 드리는 약속 : 주말이라 오늘 의협의 최종 확답을 받기는 어렵습니다. 하지만 분명히 약속드립니다. 내일 의협과의 논의 끝에 동행이 안 된다면, Plan A(6월 28일 14시, 경복궁 동십자각)는 틀림없이 진행됩니다.\n\n이번 집회는 우리의 정당한 권리를 찾기 위한 필수 과정입니다. 답답하셨을 텐데도 믿고 기다려 주신 회원 여러분께 진심으로 감사드립니다. 내일 최종 조율이 끝나는 대로 가장 먼저 공지 올리겠습니다.\n\n우선 6월 28일(일) 일정 비워두시고 조금만 더 지켜봐 주시기 바랍니다. 감사합니다.\n\n김동현 비대위원장 올림"} (function(){var tipEl=document.createElement('div');tipEl.style.cssText='position:fixed;z-index:250;pointer-events:none;background:#0B0E16;color:#EDEFF5;font-size:11.5px;font-weight:700;padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.2);box-shadow:0 10px 26px rgba(0,0,0,.6);white-space:nowrap;opacity:0;transition:opacity .12s ease;display:none;left:0;top:0;';document.body.appendChild(tipEl);var curT=null;function show(t){var tip=t.getAttribute('data-tip');if(!tip)return;curT=t;tipEl.textContent=tip;tipEl.style.display='block';var r=t.getBoundingClientRect(),tw=tipEl.offsetWidth,th=tipEl.offsetHeight;var left=r.left+r.width/2-tw/2;left=Math.max(8,Math.min(left,window.innerWidth-tw-8));var top=r.bottom+8;if(top+th>window.innerHeight-8)top=r.top-th-8;if(top<8)top=8;tipEl.style.left=Math.round(left)+'px';tipEl.style.top=Math.round(top)+'px';requestAnimationFrame(function(){tipEl.style.opacity='1';});}function hide(){curT=null;tipEl.style.opacity='0';tipEl.style.display='none';}document.addEventListener('mouseover',function(e){var t=e.target.closest&&e.target.closest('[data-tip]');if(t&&t!==curT)show(t);});document.addEventListener('mouseout',function(e){var t=e.target.closest&&e.target.closest('[data-tip]');if(t)hide();});})();
