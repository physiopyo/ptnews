 중\"","outlet":"서울일보","author":"고영준","date":"7.20","ago":"23시간 전","img":"img/ko_cokr21214.jpg","url":"https://www.seoulilbo.co.kr/news/articleView.html?idxno=21214","summary":"","ch":"ko","tags":[],"pin":true,"dt":"2026-07-20T14:42:10+09:00"},{"title":"보험금 준다더니 느닷없이 '딴소리'...도수치료·체외충격파 기준 바꾼 후 실손 보험 대혼란","outlet":"소비자가만드는신문","author":"","date":"26.07.20","ago":"어제","img":"img/pr_a37c4b292cd.jpg","url":"https://www.consumernews.co.kr/news/articleView.html?idxno=759412","summary":"# 도수치료 횟수 제한되면서 재활치료 부담커져 = 충청북도 청주시에 사는 황 모(여)씨는 최근 가입하고 있는 A보험사로부터 도수치료가 건강보험 기준 횟수를 초과하면 실손보험금 지급이 중지된다는 안내를 받았다. 황 씨의 아버지는 무릎 인공관절 수술 후 재활을 위해 2023년 10월 가입한 실손보험으로 도수치료를 받아왔다. 수술 후 최초 1개월은 주 3회, 2개월 차부터 주 2회 도수치료를 받고 있는 상황이다. 바뀐 기준대로면 실손보험금 추가 지급이 어려워져 재활치료 자체를 중단해야 하는 처지라며 어려움을 호소했다.# 체외충격파 치료","ch":"press","tags":[],"pin":false,"dt":"2026-07-20T06:19:00+09:00"},{"title":"[메디칼타임즈] 도수치료 관리급여 병원이 꼭 알아야 할 내용","outlet":"메디칼타임즈","author":"","date":"26.07.20","ago":"어제","img":"img/pr_abd2eff8244.jpg","url":"https://www.medicaltimes.com/Mobile/News/NewsView.html?ID=1169796","summary":"[메디칼타임즈=오승준 변호사]도수치료 관리급여가 2026년 7월 1일부터 시행되면서, 병·의원 현장에서는 많은 질문이 쏟아지고 있다. 이제 비급여 도수치료는 더 이상 할 수 없는 것인지, 실손보험 청구는 어떻게 되는지, 다른 진료와 결합하는 것은 가능한지, 도수치료 패키지 할인은 허용되는지, 체형교정이나 미용 목적의 도수치료는 어떻게 보아야 하는지에 관한 질문들이다.관리급여는 의료적 필요도를 넘어 남용되는 비급여 항목을 건강보험 체계 안으로 끌어들여, 가격과 급여기준을 설정하고 주기적으로 관리하겠다는 제도다. 그리고 그 첫 번째 대상으로 도수치료가 선택되었다. 도수치료를 건강보험 체계 안으로 편입하되, 본인부담률을 95%로 설정하고, 가격, 횟수, 대상, 기록, 청구절차를 강하게 관리하는 구조가 마련된 것이","ch":"press","tags":[],"pin":false,"dt":"2026-07-20T05:00:00+09:00"},{"title":"[김진호의 판례로 배우는 보험상식] 도수치료는 ‘관리급여’, 체외충격파는 ‘자율 가이드라인’… 실손 심사 적용도 달라","outlet":"한국보험신문","author":"","date":"26.07.20","ago":"어제","img":"img/pr_ac1acb73c9c.jpg","url":"https://www.insnews.co.kr/news/articleView.html?idxno=91861","summary":"최근 실손의료보험(실손보험) 가입자들에게 도수치료와 체외충격파 치료의 보험금 심사기준이 달라진다는 안내문자가 잇따라 발송되고 있다. 안내문에는 도수치료는 주 2회","ch":"press","tags":[],"pin":false,"dt":"2026-07-20T00:00:00+09:00"},{"title":"체외충격파치료 보험금 심사기준 안내 - 보험신보","outlet":"보 uthor":"","date":"26.07.08","ago":"","img":"img/pr_a261fb034a0.jpg","url":"http://www.newsmp.com/news/articleView.html?idxno=255927","summary":"대한도수의학회(회장 김경진)는 8일, 성명을 통해 보건복지부가 지난 7월 1일부터 시행한 도수치료 관리급여 고시의 개정을 촉구했다.보건복지부가 비급여관리협의체를 통해 법령을 개정하고 관리급여 정책을 강행함으로써 의사의 진료권과 환자의 의료 선택권 및 건강 추구권을 침해한다는 지적이다.학회는 \"도수치료는 비급여로 운영돼 왔지만 통증 치료의 중요한 영역인 필수의료\"라며 \"관리급여 시행 이후 뇌졸중, 사지마비 등 신경계 질환자와 중증 환자, 소아 재활 환자 등의 도수치료 중단 위기가 발생했다\"고 지적했다.뿐만 아니라 \"다수의 병의원이 도","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T22:13:50+09:00"},{"title":"복지부 \"도수치료 관리급여는 치료 제한 아닌 합리적 관리\"…AI 활용 심사체계도 도입","outlet":"CBC뉴스","author":"","date":"26.07.08","ago":"","img":"img/pr_a73cfeffb45.jpg","url":"https://www.cbci.co.kr/news/articleView.html?idxno=587586","summary":"[CBC뉴스] 보건복지부는 지난 7일 도수치료 관리급여 제도와 관련한 설명자료를 내고 \"도수치료를 금지하거나 환자의 치료권을 제한하려는 것이 아니라 의학적으로 필요한 치료는 건강보험으로 보장하고, 과잉 이용 우려가 있는 부분은 합리적으로 관리하기 위한 제도\"라고 밝혔다.관리급여는 치료의 필요성과 사회적 편익, 재정 부담 등을 종합적으로 고려해 관리가 필요한 비급여 항목의 가격과 진료기준을 정하고, 본인부담률 95%를 적용하는 선별급여 제도다.복지부는 도수치료가 근골격계 질환의 통증 완화와 관절 기능 개선 등을 위한 치료로 기존 물리","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T18:16:49+09:00"},{"title":"[단독] \"안건 제목도 말할 수 없다, 보안서약서가 있다\"…이사회를 국무회의급 기밀로 만든 물리치료사협회","outlet":"서울일보","author":"고영준","date":"7.8","ago":"","img":"img/ko_cokr21094.png","url":"https://www.seoulilbo.co.kr/news/articleView.html?idxno=21094","summary":"","ch":"ko","tags":[],"pin":false,"dt":"2026-07-08T18:15:48+09:00"},{"title":"‘과잉진료’ 도수치료·체외충격파 손질…실손 보험금 누수 막을까","outlet":"주간한국","author":"","date":"26.07.08","ago":"","img":"img/pr_af684c08e4e.jpg","url":"https://weekly.hankooki.com/news/articleView.html?idxno=7173407","summary":"[주간한국 손재하 기자] 올 하반기부터 도수치료가 관리급여로 지정되고 체외충격파에 대한 자율 가이드라인이 시행된 가운데, 손해보험사의 실손의료보험(이하 실손보험) 손해율이 개선될 것이라는 기대와 다른 비급여 진료로 수요가 이동하는 ‘풍선효과’ 현상이 나타날 수 있다는 우려가 공존하고 있다.도수치료와 체외충격파는 그동안 실손보험금 누수와 손해율 악화의 원인으로 지목돼 온 만큼, 이번 조치가 과잉 진료를 얼마나 억제할 수 있는 지가 관건이다. 일각에서는 과잉 진료 억제와 환자 치료권의 균형을 유지하기 위한 제도 점검이 필요하다는 의견도","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T18:00:00+09:00"},{"title":"관리급여 시행 일주일…현장에선 \"재활 환자 치료 포기 속출\" 분통","outlet":"청년의사","author":"","date":"26.07.08","ago":"","img":"img/pr_abbde545859.jpg","url":"http://www.docdocdoc.co.kr/news/articleView.html?idxno=3040784","summary":"관리급여 도입이 재활치료 제한은 아니라는 보건복지부 해명에 대한도수의학회가 정면 반박했다. 제도 시행 일주일 만에 피해 사례가 속출하고 있다며 지금이라도 관련 고시를 수정하라고 했다. 정부의 잘못된 정책으로 도수의학이 위축됐다며","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T17:34:01+09:00"},{"title":"도수의학회 \"관리급여는 도수의학 말살 정책\" 즉각 폐기 촉구","outlet":"의협신문","author":"","date":"26.07.08","ago":"","img":"img/pr_a0450db8446.jpg","url":"https://www.doctorsnews.co.kr/news/articleView.html?idxno=165356&sc_word=&sc_word2=","summary":"대한도수의학회가 지난 7월 1일부터 시행된 도수치료 관리급여 제도를 강도 높게 비판하며 제도 폐기를 촉구했다. 학회는 정부가 의학적 근거가 부족한 기준을 일방적으로 도입해 환자의 치료 선택권과 의사의 진료권을 침해하고 있으며, 결과적으로 도수의학 자체를 위축시키는 정책이 될 것이라고 진단했다.대한도수의학회는 8일 성명을 내고 \"도수치료 관리급여는 국민도, 의사도, 정부도 손해를 보는 정책이며 손해보험사만 이익을 보는 제도\"라며 \"보건복지부가 법령까지 개정해 관리급여를 강행하면서 의료인의 진료권과 환자의 의료 선택권, 건강추구권을 침","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T16:57:07+09:00"},{"title":"아파도 도수치료 못 받는다?…복지부, 관리급여 오해 해명","outlet":"뉴스경남","author":"","date":"26.07.08","ago":"","img":"img/pr_abceb26b859.jpg","url":"https://www.newsgn.com/news/articleView.html?idxno=561259","summary":"7월부터 도수치료가 ‘관리급여’ 항목으로 전환되면서 의료기관들이 도수치료 운영을 중단하거나 대폭 축소하는 움직임을 보이고 있어 환자들의 우려가 커지고 있다.실제 온라인에서는 실손보험 처리가 안 된다거나 일정 횟수가 넘어가면 치료 자체를 못 받는다는 등의 소문까지 돌면서 환자의 치료권이","ch":"press","tags":[],"pin":false,"dt":"2026-07-08T16:10:59+09:00"},{"title":"“도수치료 관리급여 시행 후 병·의원 진료 접고, 물리치료사 일자리 잃고···”","outlet":"의사신문","author":"","date":"26.07.08","ago":"","img":"img/pr_af60c5865b4.jpg","url":"http://www.doctorstimes.com/news/articleView.html?idxno=238949","summary":"도수치료 관리급여 시행 이후 도수치료를 시행하던 병·의원들이 진료를 접고, 물리치료사들은 직장을 잃었으며, 도수치료 전문 의사들도 경영난을 호소하고 있다는 주장이 제기됐다.대한도수의학회는 8일 성명서를 통해 “보건복지부가 지난 1일부터 도수치료 관리급여를 시행했다”며 “관리급여라는 급조 정책으로 의사의 진료권과 환자의 의료 선택권, 건강 추구권까지 침해하고 있다”고 밝혔다.대한도수의학회는 도수치료가 비급여였지만 통증치료의 하나인 필수의료라고 주장했다. 비급여 관리를 한다고 필수의료가 개선되는 것은 아니며, 도수치료 가격과 제공 방식","ch": /news/national/%EB%8F%84%EC%88%98%EC%B9%98%EB%A3%8C-%EA%B4%80%EB%A6%AC%EA%B8%89%EC%97%AC-%ED%95%98%EB%A3%A8-%EC%95%9E%EC%9C%BC%EB%A1%9C-%EB%B3%91%EC%9B%90-%ED%99%98%EC%9E%90-%ED%98%BC%EB%9E%80-%EB%AC%BC%EB%A6%AC%EC%B9%98%EB%A3%8C%EC%82%AC%EB%93%A4-%EA%B3%A0%EC%9A%A9-%EB%B6%88%EC%95%88/ar-AA26PkFj","summary":"","ch":"press","tags":[],"pin":false,"dt":"2026-07-03T21:58:53+09:00"},{"title":"복지부 ‘도수치료’ 제한… 물리치료사 실직 위기, 실수요자도 불만","outlet":"경인일보","author":"","date":"26.07.03","ago":"","img":"img/pr_a8c301019af.jpg","url":"https://www.kyeongin.com/article/1766731","summary":"고양에서 물리치료사로 활동 중인 김지현(가명)씨는 도수 치료 비용의 15% 가량 받던 인센티브를 다음달부터 받을 수 없게 됐다. 김씨는 “한달 기준 90여만원의 월급이 줄어드는 셈”이라며 “정규직이라 그나마 사정이 나은 편이고 주변의 프리랜서 물리치료사 중에는 최근 권","ch":"press","tags":[],"pin":false,"dt":"2026-07-03T20:25:20+09:00"},{"title":"복지부 “관리급여, 진료권 침해 아냐”…환자는 “내 다리 어쩌라는 거냐”","outlet":"메디게이트뉴스","author":"","date":"26.07.03","ago":"","img":"img/pr_ac755acd88a.jpg","url":"https://www.medigatenews.com/news/1511349115","summary":"보건복지부 필수의료총괄과 이영재 과장이 30일 국회의원회관에서 열린 토론회에서 관리급여를 둘러싼 논란에 대해 반박하고 있다. [메디게이트뉴스 박민식 기자] 도수치료에 대한 관리급여 적용이 하루 앞으로 다가온 가운데, 보건복지부가 의료계와 환자단체의 진료권 침해 지적을 반박하고 나섰다. 관리급여 항목의 지속 확대 우려에 대해서는 체외충격파치료에 적용 예정인 ‘자율 가이드라인’ 모델이 대안이 될 수 있다는 가능성을 시사했다. 복지부 필수의료총괄과 이영재 과장은 30일 개혁신당 이주영 의원 주최로 국회의원회관 제1세미나실에서 열린 ‘관리급여 제도의 문제점 및 개선 방안 모색’ 토론회에서 “관리급여의 가격, 횟수는 환자진료권과 의사의 자율성을 침해하지 않기 위해 관련 비급여 통계와 보건의료연구원에서 도수치료에 대해","ch":"press","tags":[],"pin":false,"dt":"2026-07-03T17:03:37+09:00"},{"title":"\"보험료 대납·차명 모집\"..삼성생명·신한라이프·흥국생명 설계사 제재","outlet":"포쓰저널","author":"","date":"26.07.03","ago":"","img":"img/in_aea825424ab.jpg","url":"https://www.4th.kr/news/articleView.html?idxno=2114182","summary":"보험료 대납과 실제 명의인이 아닌 사람 명의의 보험계약 모집, 다른 설계사 명의를 이용한 보험모집 등 모집질서 위반으로 생명보험사 소속 보험설계사 10명이 금융당국 제재를 받았다.3일 금융당국에 따르면 금융감독원은 지난달 26일 삼성생명보험, 신한라이프생명보험, 흥국생명보험 보험설계사 10명에 대해 보험업법 위반으로 업무정지와 과태료 처분을 내렸다.제재 대상자는 삼성생명 1명, 신한라이프 2명, 흥국생명 7명 등 전·현직 보험설계사 10명이다.3명에게는 업무정지, 8명에게는 과태료가 내려졌다.흥국생명 전 보험설계사 1명은 업무정지와","ch":"ins","ta ":"[동아경제신문=유경석 기자] 정부가 도수치료를 관리급여로 전환하고 회당 수가 및 연간 이용 횟수를 제한하는 정책을","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T19:24:00+09:00"},{"title":"도수치료 가격 표준화 시행, 의료계 “환자들 치료 사각지대에 놓일 것”","outlet":"전북도민일보","author":"","date":"26.07.02","ago":"","img":"","url":"http://www.domin.co.kr/news/articleView.html?idxno=1560621","summary":"이달부터 도수치료 가격이 표준화되고 관리급여 제도가 도입되면서 병원들이 경영난 등을 이유로 도수치료를 중단하고 있는 것으로 나타났다.병원마다 다르던 도수치료 가격이 4만원대로 통일되고 연간 치료 횟수까지 제한되면서 수익성 악화를 예상해 이를 멈추고 있기 때문이다.의료계에서는 이번 제도 도입으로 인해 중추신경계 환자 등 도수치료가 꼭 필요한 환자들이 치료 사각지대에 놓일 것으로 우려하면서 대책 마련을 촉구하고 있다.정부는 의료비 부담을 줄이고 과잉진료를 예방하기 위해 이달부터 도수치료에 관리급여를 도입해 가격을 표준화하고 이용 기준을","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T17:58:09+09:00"},{"title":"의협 \"관리급여, 의료접근성 제한 초래…법률·정책 대응 지속\"","outlet":"데일리안","author":"","date":"26.07.02","ago":"","img":"","url":"https://news.nate.com/view/20260702n28763","summary":"한눈에 보는 오늘 : 사회 - 뉴스 : 대한의사협회. ⓒ연합뉴스 의사단체가 정부의 도수치료 관리급여 시행을 “비급여 제도를 무력화하는 정책”이라고 비판하며 법률·정책 대응을 이어가겠다고 밝혔다. 청년층 탈모 치료의 건강보험 급여 적용에 대해서는 건강보험 재정과 형평성을 고려할 때 바람직하지","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:24:00+09:00"},{"title":"의협, 관리급여 추가 지정 저지 총력…\"현장 피해 법적 대응\"","outlet":"청년의사","author":"","date":"26.07.02","ago":"","img":"","url":"https://www.docdocdoc.co.kr/news/articleView.html?idxno=3040604","summary":"도수치료가 환자 본인부담률 95%의 관리급여로 전환된 지 하루 만에 대한의사협회가 대응 강화를 선언했다. 관리급여 시행으로 발생하는 의료현장과 환자 피해사례를 수집하고 향후 온열치료와 신경성형술, 언어치료 등 추가 관리급여 지정에도 적극 대응하겠다는 방침이다.의협은 2일 오후 정례브리핑에서 관리급여 제도에 대해 \"비급여라는 법적 급여제도를 무력화하기 위해 도입된 무리한 제도\"라며 \"국민 치료권과 의료접근성을 제한하게 될 것\"이라고 지적했다.의협은 관리급여 도입 논의 초기부터 비급여관리정책협의체, 실손보험대책위원회, 비급여조정분과위원","ch":"press","tags":[],"pin":false,"dt":"2026-07-02T16:22:47+09:00"},{"title":"“치료인가, 마사지인가”…도수치료 개편이 겨누는 진짜 경계선","outlet":"보험저널","author":"","date":"26.07.02","ago":"","img":"","url":"https://www.insjournal.co.kr/news/articleView.html?idxno=32127","summary":"도수치료 관리급여 전환을 둘러싼 관심이 1회 수가와 연간 이용 횟수 제한에 집중되고 있다. 하지만 보험업계가 주목해야 할 더 본질적인 쟁점은 도수치료가 어디까지 의학적 치료이고 어디서부터 마사지성 서비스로 분류되느냐는 문제다.보험범죄 한 획일적인 기준으로 맞춤 치료가 어","ch":"press","tags":[],"pin":false,"dt":"2026-06-30T16:58:00+09:00"},{"title":"도수치료 관리급여 시행 D-1…환자 불안 커지고 의료계 반발 확산","outlet":"쿠키뉴스","author":"","date":"26.06.30","ago":"","img":"","url":"https://news.nate.com/view/20260630n30390","summary":"한눈에 보는 오늘 : 사회 - 뉴스 : 서울의 한 대학병원에서 환자와 보호자들이 진료를 기다리고 있다. 쿠키뉴스 자료사진정부가 오는 7월부터 도수치료를 ‘관리급여’ 대상으로 전환하는 가운데 치료 중단과 접근성 저하를 우려하는 환자·보호자들의 불안이 커지고 있다. 정책 재검토를 요구하는 국회","ch":"press","tags":[],"pin":false,"dt":"2026-06-30T16:28:00+09:00"},{"title":"의료계·환자단체 “관리급여, 치료권 침해하는 행정 폭거”","outlet":"덴탈투데이","author":"","date":"26.06.30","ago":"","img":"","url":"https://www.dttoday.com/news/articleView.html?idxno=96858","summary":"정부가 건강보험 재정 건전화와 실손보험 구조 개편을 명분으로 7월 1일부터 시행 예정인 ‘관리급여’ 제도가 의료 현장과 환자들로부터 거센 반발을 사고 있다. 급여 체계 내로 비급여 항목을 편입시키면서 90~95%라는 사실상 비급여 수준의 높은 본인부담금을 부과하는 방식을 두고, 의료계와 환자단체는 이것이 국민의 치료 선택권을 제한하고 의료 현장의 자율성을 훼손하는 ‘행정적 폭거’라고 강하게 성토했다.30일 국회의원회관 제1세미나실에서 열린 ‘관리급여, 누구를 위한 정책인가?’ 토론회에서는 이 제도의 도입 배경과 실효성, 그리고 환자","ch":"press","tags":[],"pin":false,"dt":"2026-06-30T16:17:00+09:00"},{"title":"관리급여, '환자 치료권 침해' 논란… 의료계 \"의료 자율성 보장 필요\"","outlet":"의사신문","author":"","date":"26.06.30","ago":"","img":"","url":"http://www.doctorstimes.com/news/articleView.html?idxno=238819","summary":"정부가 오는 7월부터 도입하는 관리급여 제도를 둘러싸고 의료계와 환자단체, 정부·보험업계가 첨예한 입장 차를 드러냈다. 의료계와 환자 측은 관리급여가 환자 부담 증가와 의료 자율성 침해, 중증질환자의 치료권 제한으로 이어질 수 있다고 우려한 반면, 정부와 보험업계는 과잉 비급여를 관리하고 필수의료를 강화하기 위한 불가피한 제도라고 맞섰다.대한의사협회와 한국중증질환연합회, 개혁신당 이주영 의원은 30일 서울 여의도 국회 의원회관에서","ch":"press","tags":[],"pin":false,"dt":"2026-06-30T16:07:00+09:00"},{"title":"‘관리급여’ 국회 토론회, 의료계-보험업계 입장 차 확인","outlet":"의약뉴스","author":"","date":"26.06.30","ago":"","img":"","url":"https://www.newsmp.com/news/articleView.html?idxno=255436","summary":"[의약뉴스] 7월 1일부터 도수치료에 대한 관리급여가 시행되는 가운데, 30일 국회의원회관에서 대한의사협회와 개혁신당 이주영 의원 주최로 ‘관리급여, 누구를 위한 정책인가’ 토론회가 열렸다. 이날 토론회에서는 관리급여 제도의 도입 취지와 현장에서 제기되는 우려사항에 대한 논의가 진행됐다. ◆발제자들, 관리급여 제도 배경과 문제점 지적이날 발제를 맡은 대한의사협회 이봉근 보험이사는 관리급여 도입 배경에 대해 “윤석열 정부의 의료개혁 과정에서 비급  데다","ch":"press","tags":[],"pin":false,"dt":"2026-06-26T20:52:30+09:00"},{"title":"\"보험설계사, 사기 연루 잇따라\"…금감원, 보험사 다수 제재","outlet":"비즈월드","author":"","date":"26.06.26","ago":"","img":"img/in_a458d6a89f3.jpg","url":"https://www.bizwnews.com/news/articleView.html?idxno=139485","summary":"[비즈월드] 금융감독원이 보험사기에 연루된 보험설계사들에 대한 제재 내용을 공개했다.허위 진단서 제출과 가짜 교통사고, 도수치료 가장 등 다양한 보험사기 사례가 적발됐다.26일 금융감독원(이하 금감원) 제재공시에 따르면 금감원은 최근 삼성생명과 삼성화재, 한화손해보험, 흥국화재 소속 보험설계사 대상 제재를 내렸다.삼성화재 전 소속 보험설계사는 지난 2019년부터 2020년까지 공모를 통해 허위 교통사고를 접수하고 진단서를 제출하는 방식으로 2개 보험회사에서 보험금 872만원을 편취한 사실이 적발돼 등록취소 처분을 받았다.흥국화재에서","ch":"ins","tags":["보험사"],"pin":false,"dt":"2026-06-26T19:59:00+09:00"},{"title":"대학병원도 도수치료 포기…관리급여제도 시행 전부터 후폭풍 예고","outlet":"코리아헬스로그","author":"","date":"26.06.26","ago":"","img":"","url":"https://www.koreahealthlog.com/news/articleView.html?idxno=57824","summary":"오는 7월 도수치료 관리급여 시행을 앞두고 개원가는 물론 대학병원에서도 혼란이 커지고 있다. 관리급여 기준으로 입원환자 재활치료를 지속하기 어렵다는 판단에 따라 일부 대학병원이 도수치료 중단을 결정하면서 제도 시행 전부터 후폭풍이 예고되고 있다.서울 강남에 있는 A대학병원 재활의학과는 오는 7월 1일부터 도수치료 운영을 중단하기로 했다. 정부의 획일적인 횟수 제한과 수가 통제 기준으로는 대학병원에 입원한 중증·수술환자에 대한 정상적인 재활치료가 불가능하다는 판단에서다.A대학병원은 최근","ch":"press","tags":[],"pin":false,"dt":"2026-06-26T18:38:40+09:00"},{"title":": 대학병원도 도수치료 중단…관리급여 여파에 사장 수순","outlet":"MEDI:GATE NEWS","author":"","date":"26.06.26","ago":"","img":"","url":"https://m.medigatenews.com/news/3356602513","summary":"서울 강남 소재 A대학병원은 최근 환자들에게 7월1일부터 도수치료를 중단한다고 공지했다. [메디게이트뉴스 박민식 기자] 관리급여로 전환을 앞둔 도수치료가 주요 대학병원에서도 퇴출 수순에 들어가는 모습이다. 시행 횟수 제한과 늘어난 행정적 부담 탓인데, 환자들의 치료받을 권리가 위협받을 수 있다는 지적이 나온다. 26일 메디게이트뉴스 취재 결과, 서울 강남 소재 A대학병원 재활의학과는 최근 환자들에게 7월1일부로 도수치료 운영 중단을 결정했다고 공지했다. 기존에 도수치료를 받아오던 환자들도 필요한 경우에 한해 대체 치료를 받아야 한다. A대학병원의 이 같은 결정은 그간 비급여였던 도수치료가 오는 7월부터 관리급여로 전환되는 데 따른 것이다. 정부는 도수치료가 진료비 규모 및 의료기관별 가격 편차가 크고 오남용","ch":"press","tags":[],"pin":false,"dt":"2026-06-26T14:17:00+09:00"},{"title":"도수의학회 \"도수치료 관리급여 철회해야…건정심 개편도 필요\"","outlet":"팍스메디컬뉴스","author":"","date":"26.06.26","ago":"","img":"","url":"https://www.paxmedicalnews.co 려면 종합보험도?… NH농협손보, 금감원 경고에도 끼워팔기 논란","outlet":"핀포인트뉴스","author":"","date":"26.06.11","ago":"","img":"img/in_a50be2d1f85.jpg","url":"https://www.pinpointnews.co.kr/news/articleView.html?idxno=459484","summary":"금융당국이 실손의료보험 판매 과정에서 다른 보험상품을 함께 판매하는 연계판매 관행에 대한 점검을 예고했지만 현장에서는 관련 논란이 이어지고 있다.11일 조선비즈 단독보도에 따르면 NH농협손해보험의 5세대 실손보험 가입을 희망한 30대 여성 A씨는 올해 1월 법인보험대리점(GA) 소속 설계사와 상담하는 과정에서 종합보험 가입을 함께 안내받았다.보도에 따르면 A씨는 NH농협손보 실손보험에 단독 가입하려 했으나 설계사로부터 종합보험 가입이 필요하다는 취지의 설명을 들었고 이에 월 보험료 약 5만원 수준의 종합보험에 가입했다.그러나 이후","ch":"ins","tags":["보험사"],"pin":false,"dt":"2026-06-11T17:55:20+09:00"},{"title":"신한라이프, 5대 생보사 중 민원증가율","outlet":"세이프타임즈","author":"","date":"26.06.11","ago":"","img":"img/in_a5415d49285.jpg","url":"https://www.safetimes.co.kr/news/articleView.html?idxno=243377","summary":"신한라이프생명의 민원증가율이 5대 생보사 중 최대를 기록했다. 보험금지급 불만의 불씨로 작용한 것으로 분석된다.생명보험은 피보험자의 생명을 담보로 하는 보험으로 피보험자가 사망하거나 약관에서 정한 보험사고가 발생했을 때 보험금을 지급하는 상품이다.보험금지급에 대한 불만이 많다는 점은 신한라이프 고객의 불만이 고조되고 있다고 볼 수 있다.11일 세이프타임즈가 생명보험협회 소비자포털 공시를 분석한 결과 5대 생명보험사 가운데 신한라이프의 민원 증가폭이 최근 4분기(2025년 2분기~2026년 1분기) 동안 가장 큰 것으로 나타났다.신한","ch":"ins","tags":["보험사"],"pin":false,"dt":"2026-06-11T16:05:00+09:00"},{"title":"가입자에 보험금 잘 안 주기로","outlet":"논객닷컴","author":"","date":"26.06.11","ago":"","img":"img/in_a4a36813c8e.jpg","url":"http://www.nongaek.com/news/articleView.html?idxno=95682","summary":"보험사가 보험계약자에게 보험금을 지급하지 않는 사례가 좀처럼 줄지 않고 있다. 약관상 보험금 지급에 문제가 없는데도 보험계약자와 보험사 간의 정보 격차, 또는 행정상의 문제로 보험금이 지급되지 않는 경우가 잦다.자산 10조 원 이상의 상위 9개 손해보험사 중에서는 농협손해보험과 메리츠화재가 부지급률 상위1,2위를 차지한 것으로 나타났다. 두 보험사는 보험금 지급 등의 서비스 제공에서 다른 보험사에 비해 충실하지 않다는 것을 보여준다.이에 소비자주권시민회의 (이하 소비자주권)는 대형 손해보험사 간에도 부지급률과 지급 지연 등에서 편차","ch":"ins","tags":["보험사"],"pin":false,"dt":"2026-06-11T15:07:01+09:00"},{"title":"\"보험료는 꼬박꼬박, 보험금은 어떻게든 안 준다\"…보험사의 세 가지 거절 공식","outlet":"서울일보","author":"고영준","date":"6.11","ago":"","img":"img/ko_cokr20819.jpg","url":"https://www.seoulilbo.co.kr/news/articleView.html?idxno=20819","summary":"","ch":"ko","tags":[],"pin":false,"dt":"2026-06-11T14:0 증장애인 등 환자 치료권 보장 위한 도수치료 관리급여 정책 재검토 요청」","body":"요지 : 도수치료 주 2회·연간 최대 24회 제한이 중증장애인·희귀질환자의 재활 연속성을 침해한다고 보고, 상병코드별 예외 조항 도입과 정책 전면 재검토를 요구\n소관위원회 : 보건복지위원회\n청원 진행 기간 : 2026년 7월 2일 ~ 8월 1일\n참여 방법 : 국회 국민동의청원(petitions.assembly.go.kr) 온라인 동의·의견 등록\n참고 : 별도의 「도수치료 관리급여 재검토·제도개선」 청원은 6월 말 6만여 명 동의로 5만 명 요건을 넘어 소관 상임위 회부 단계\n출처 : 동아경제신문 2026.07.02, 뉴스1·청년의사 2026.06.30"},{"badge":"국회 입법","color":"#2E7D5A","date":"4.21","title":"방문재활·통합돌봄 관련 의료기사법 개정안 국회 계류","body":"요지 : 물리치료사 업무의 '의사 지도하' 규정을 '지도 또는 처방'으로 확대해 병원 밖 방문재활을 제도권에서 수행하도록 하는 의료기사법 개정안\n발의 : 남인순(더불어민주당)·최보윤(국민의힘) 공동, 2025년 10월\n소관위원회 : 보건복지위원회(계류)\n경과 : 2026년 4월 21일 국회 소통관에서 노인·장애인·환자·의료기사 단체가 통과 촉구 기자회견. 2026년 3월 전국 시행된 통합돌봄과 연계한 방문재활 제도화 필요성 제기\n쟁점 : 의료계는 안전성·의사 지도 원칙을 들어 이견, 국회 대치\n출처 : 이투데이 2026.04.21, 세계일보 2026.02.26"},{"badge":"국회 일정","color":"#3A6EA5","date":"6.30","title":"국회토론회 「중증질환자 피해사례로 본 실손보험·관리급여 제도의 문제점 및 개선방안」","img":"img/notice_assembly2.jpg","body":"일시 : 2026년 6월 30일(화) 10:00~12:00\n장소 : 국회의원회관 제1세미나실\n주최 : 국회의원 이주영(개혁신당)\n주관 : 대한의사협회, 한국중증질환연합회\n좌장 : 이태연, 사회 : 안치현 (대한의사협회 보험이사)\n발제1 : 관리급여 추진의 문제점과 바람직한 비급여 관리 대안 (이봉근)\n발제2 : 중증질환자 피해사례로 본 실손보험 제도의 문제점 및 개선안 (최태형 변호사)\n이후 환자 피해사례 발표, 지정토론(의료계·환자단체·보험업계·금융계·정부), 질의응답"},{"badge":"국회 일정","color":"#3A6EA5","date":"6.30","title":"「지역사회통합돌봄, 성인지 관점에서의 대안모색」 토론회","img":"img/notice_assembly1.jpg","body":"일시 : 2026년 6월 30일(화) 오전 10시\n장소 : 국회 의원회관 제8간담회실\n주최 : 국회부의장 남인순, 한국여성연구소, 한국여성단체연합\n좌장 : 김희강(고려대 행정학과 교수)\n발표 : 송다영(인천대), 최나리(젠더로 다시 여는 연구소), 백경흔(이화여대)\n토론 : 장수정, 허민숙, 이정아\n안건 : 의료·요양 등 지역 돌봄 통합지원에 관한 법률의 성인지 분석과 개선 방안"},{"badge":"집회 확정","color":"#D8483A","date":"6.22","title":"6.28 집회 'Plan A' 최종 확정 (경복궁 동십자각 14:00)","body":"안녕하세요. 대한물리치료사협회(이하 '대물협') 및 회원 대표 운영진에서 알려드립니다.\n\n대물협과 의협의 논의 끝에, 의협은 의협대로 대물협은 대물협대로 같은 날 각자의 장소에서 목소리를 내기로 최종 결정되었습니다.\n\n이에 저희 집회는 6월 28일 경복궁 동십자각에서 이전에 공지드린 [Plan A]로 진행됩니다.\n\n모두 많이 기다리셨을 텐데, 빠르게 다음 공지 올리겠습니다. 감사합니다.\n\n[Plan A] 우리의 힘으로 진행한다\n날짜 : 2026년 6월 28일(일)\n장소 : 경복궁 동십자각\n시간 : 14:00 ~ 16:00\n수용 인원 : 1,000명"},{"badge":"자유방","color":"#3E9E78","date":"6.22","title":"각 시도회 도수치료 관리급여 대응 현황 제보 요청","body":"각 지역에 계신 물리치료사 회원 여러분께 알려드립니다.\n\n관리급여로 인한 치료사 생존권 위협이 턱 앞까지 다가왔습니다. 우리 생존권을 두고 각 시도 물리치료사회가 회원을 지켜주고 있는지, [도수치료 관리급여]에 대한 각 시도회의 활동 현황을 파악하고자 합니다.\n\n회원님들께서 가입되어 계신 각 지역 밴드·인스타그램·페이스북 등 SNS에 올라온 협회의 활동 소식이나 공지가 있다면 적극적인 제보 부탁드립니다.\n\n제보 내용 : 각 시도회 밴드·인스타 등 SNS의 도수치료 관리급여 관련 활동/공지 캡쳐본, 또는 내부 분위기·내부 관계자 제보 (철저한 익명 보장)\n\n제보 방법 : '바보' 방장에게 개인 카톡\n\n각 시도 물리치료사회가 우리 권익을 위해 어떤 도움을 주고 있는지 파악하려는 취지입니다. 감사합니다."},{"badge":"중앙협회","color":"#8C72D6","date":"6.22","title":"대한물리치료사협회 고용위기대응센터 : 권고사직·고용피해 안내","img":"img/notice_kpta.jpg","body":"대한물리치료사협회 고용위기대응센터 안내입니다. 권고사직·사직서(자진퇴사) 작성 주의, 도수치료 관리급여 고용피해 전문가(노무사) 상담 안내. 노무사 류시나 010-3704-8756."},{"badge":"집회 공지","color":"#D8483A","date":"6.21","title":"6.28 총궐기 1차 확정안 (Plan A·B) 안내","body":"안녕하세요. 대한물리치료사협회(이하 '대물협') 및 회원 대표 운영진에서 알려드립니다.\n\n회원 여러분, 많이 기다리셨습니다. 조금 더 빨리 확정된 소식을 전해드리지 못해 죄송합니다. 협회장님과 긴밀히 논의한 끝에 1차 확정안을 먼저 공유드립니다.\n\n[Plan A] 우리의 힘으로 진행한다 : 6월 28일(일) 14:00~16:00, 경복궁 동십자각, 수용 인원 1,000명\n\n[Plan B] 대한의사협회(이하 '의협')와의 연대 : 6월 28일(일) 16:00~18:00, 대한문 일대, 수용 인원 미정\n\n요약 : Plan A 또는 Plan B로 진행 예정\n\n[협회장님 의견] \"목소리를 더 크고 효과적으로 전달할 수 있다면, 수용 인원 등을 확인한 후 의협과 연대하는 방향도 고려해 보자\"는 제안을 주셨습니다.\n\n내일(6월 22일, 월) 대물협과 의협이 직접 만나 구체적인 논의를 진행합니다. 연대가 성사되면 시너지를 위해 시간이나 장소가 일부 조정될 수 있으며, 불가피할 경우 Plan A 장소에서 진행합니다.\n\n회원님들께 드리는 약속 : 주말이라 오늘 의협의 최종 확답을 받기는 어렵습니다. 하지만 분명히 약속드립니다. 내일 의협과의 논의 끝에 동행이 안 된다면, Plan A(6월 28일 14시, 경복궁 동십자각)는 틀림없이 진행됩니다.\n\n이번 집회는 우리의 정당한 권리를 찾기 위한 필수 과정입니다. 답답하셨을 텐데도 믿고 기다려 주신 회원 여러분께 진심으로 감사드립니다. 내일 최종 조율이 끝나는 대로 가장 먼저 공지 올리겠습니다.\n\n우선 6월 28일(일) 일정 비워두시고 조금만 더 지켜봐 주시기 바랍니다. 감사합니다.\n\n김동현 비대위원장 올림"}],"guide":{"clinician":{"label":"치료사용","subs":[{"slug":"dosu-clinician","label":"도수치료","pages":["guide/img/dosu-clinician-1.png","guide/img/dosu-clinician-2.png","guide/img/dosu-clinician-3.png","guide/img/dosu-clinician-4.png","guide/img/dosu-clinician-5.png","guide/img/dosu-clinician-6.png","guide/img/dosu-clinician-7.png"],"pdf":"g   else return;
  renderCenter();return;}
});

(function(){var hi=[].slice.call(document.querySelectorAll('#hero .hero-img'));if(hi.length<2)return;var dw=document.getElementById('heroDots'),pb=document.getElementById('heroPause');var idx=0,timer=null,playing=true;var PZ='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1.2"/><rect x="14" y="5" width="4" height="14" rx="1.2"/></svg>';var PL='<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>';var dots=hi.map(function(_,i){var b=document.createElement('button');b.className='dot'+(i===0?' on':'');b.type='button';b.setAttribute('aria-label',(i+1)+'번 슬라이드');b.addEventListener('click',function(){go(i);if(playing)start();});return b;});if(dw)dots.forEach(function(d){dw.appendChild(d);});function go(n){hi[idx].classList.remove('on');dots[idx].classList.remove('on');idx=(n+hi.length)%hi.length;hi[idx].classList.add('on');dots[idx].classList.add('on');}function start(){stop();timer=setInterval(function(){go(idx+1);},5000);}function stop(){if(timer){clearInterval(timer);timer=null;}}if(pb){pb.innerHTML=PZ;pb.addEventListener('click',function(){if(playing){playing=false;stop();pb.innerHTML=PL;pb.setAttribute('aria-label','슬라이드 재생');}else{playing=true;start();pb.innerHTML=PZ;pb.setAttribute('aria-label','슬라이드 일시정지');}});}start();})();
(function(){var tipEl=document.createElement('div');tipEl.style.cssText='position:fixed;z-index:250;pointer-events:none;background:#0B0E16;color:#EDEFF5;font-size:11.5px;font-weight:700;padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.2);box-shadow:0 10px 26px rgba(0,0,0,.6);white-space:nowrap;opacity:0;transition:opacity .12s ease;display:none;left:0;top:0;';document.body.appendChild(tipEl);var curT=null;function show(t){var tip=t.getAttribute('data-tip');if(!tip)return;curT=t;tipEl.textContent=tip;tipEl.style.display='block';var r=t.getBoundingClientRect(),tw=tipEl.offsetWidth,th=tipEl.offsetHeight;var left=r.left+r.width/2-tw/2;left=Math.max(8,Math.min(left,window.innerWidth-tw-8));var top=r.bottom+8;if(top+th>window.innerHeight-8)top=r.top-th-8;if(top<8)top=8;tipEl.style.left=Math.round(left)+'px';tipEl.style.top=Math.round(top)+'px';requestAnimationFrame(function(){tipEl.style.opacity='1';});}function hide(){curT=null;tipEl.style.opacity='0';tipEl.style.display='none';}document.addEventListener('mouseover',function(e){var t=e.target.closest&&e.target.closest('[data-tip]');if(t&&t!==curT)show(t);});document.addEventListener('mouseout',function(e){var t=e.target.closest&&e.target.closest('[data-tip]');if(t)hide();});})();
